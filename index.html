  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;400;600;700&display=swap');
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c28;--border:#2a2a3a;--text:#e8e8f0;--text-dim:#8888a0;--accent:#00e5a0;--accent-dim:#00e5a020;--danger:#ff4466;--warning:#ffaa00;--radius:16px}
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;overflow:hidden;-webkit-tap-highlight-color:transparent}
    .app{display:flex;flex-direction:column;height:100dvh;max-width:500px;margin:0 auto}
    .header{padding:16px 20px;display:flex;align-items:center;gap:12px;z-index:10;background:var(--bg);border-bottom:1px solid var(--border)}
    .header-icon{width:36px;height:36px;background:var(--accent);border-radius:10px;display:grid;place-items:center;flex-shrink:0}
    .header-icon svg{width:20px;height:20px}
    .header h1{font-size:1.15rem;font-weight:700;letter-spacing:-0.02em}
    .header small{font-size:.7rem;color:var(--text-dim);font-weight:400}
    .engine-badge{margin-left:auto;font-size:.6rem;padding:3px 8px;border-radius:6px;background:var(--surface2);color:var(--text-dim);font-family:'JetBrains Mono',monospace;white-space:nowrap}
    .camera-container{position:relative;flex:1;background:#000;overflow:hidden;display:flex;align-items:center;justify-content:center}
    #video{width:100%;height:100%;object-fit:cover}
    .scan-zone{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:220px;height:220px;pointer-events:none}
    .scan-zone::before{content:'';position:absolute;inset:-2px;border:2px solid var(--accent);border-radius:20px;opacity:.6}
    .scan-corner{position:absolute;width:28px;height:28px;border-color:var(--accent);border-style:solid;border-width:0}
    .scan-corner.tl{top:-2px;left:-2px;border-top-width:3px;border-left-width:3px;border-radius:12px 0 0 0}
    .scan-corner.tr{top:-2px;right:-2px;border-top-width:3px;border-right-width:3px;border-radius:0 12px 0 0}
    .scan-corner.bl{bottom:-2px;left:-2px;border-bottom-width:3px;border-left-width:3px;border-radius:0 0 0 12px}
    .scan-corner.br{bottom:-2px;right:-2px;border-bottom-width:3px;border-right-width:3px;border-radius:0 0 12px 0}
    .scan-line{position:absolute;top:0;left:10%;width:80%;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);border-radius:2px;animation:scanMove 2s ease-in-out infinite;box-shadow:0 0 12px var(--accent)}
    @keyframes scanMove{0%,100%{top:5%;opacity:.4}50%{top:92%;opacity:1}}
    .camera-overlay-mask{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 260px 260px at center,transparent 45%,rgba(0,0,0,.6) 70%)}
    .status-bar{position:absolute;bottom:0;left:0;right:0;padding:16px 20px;background:linear-gradient(transparent,rgba(0,0,0,.85));display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:5}
    .status-text{font-size:.82rem;color:var(--text-dim);display:flex;align-items:center;gap:8px}
    .status-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulse 1.5s ease infinite}
    .status-dot.error{background:var(--danger);animation:none}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    .controls{padding:12px 20px;background:var(--bg);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:16px}
    .btn{border:none;cursor:pointer;font-family:inherit;border-radius:12px;font-weight:600;transition:all .15s;display:flex;align-items:center;gap:8px}
    .btn:active{transform:scale(.96)}
    .btn-primary{background:var(--accent);color:#0a0a0f;padding:14px 28px;font-size:.92rem}
    .btn-icon{width:48px;height:48px;background:var(--surface2);color:var(--text);display:grid;place-items:center;border-radius:50%}
    .btn-icon svg{width:20px;height:20px}
    .btn-icon.active{background:var(--accent-dim);color:var(--accent)}
    .btn-capture{width:64px;height:64px;background:var(--accent);border-radius:50%;display:grid;place-items:center;border:3px solid var(--bg);box-shadow:0 0 0 2px var(--accent)}
    .btn-capture svg{width:28px;height:28px;color:var(--bg)}
    .results-panel{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .35s cubic-bezier(.16,1,.3,1)}
    .results-panel.open{transform:translateY(0)}
    .results-header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
    .results-header h2{font-size:1.1rem;font-weight:700}
    .btn-close{width:36px;height:36px;background:var(--surface2);border:none;color:var(--text);border-radius:50%;display:grid;place-items:center;cursor:pointer;font-size:1.2rem}
    .results-body{flex:1;overflow-y:auto;padding:16px 20px;-webkit-overflow-scrolling:touch}
    .result-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;font-size:.75rem;font-weight:600;margin-bottom:16px}
    .result-badge.success{background:#00e5a018;color:var(--accent)}
    .result-badge.warning{background:#ffaa0018;color:var(--warning)}
    .raw-data{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:20px}
    .raw-data-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim);margin-bottom:8px}
    .raw-data pre{font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--accent);white-space:pre-wrap;word-break:break-all;line-height:1.6}
    .fields-grid{display:flex;flex-direction:column;gap:8px}
    .field-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px}
    .field-tag{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--accent);font-weight:600;margin-bottom:2px}
    .field-label{font-size:.72rem;color:var(--text-dim);margin-bottom:4px}
    .field-value{font-size:.95rem;font-weight:600;color:var(--text);word-break:break-word}
    .results-actions{padding:16px 20px;border-top:1px solid var(--border);display:flex;gap:10px}
    .results-actions .btn{flex:1;justify-content:center}
    .btn-secondary{background:var(--surface2);color:var(--text);padding:14px 20px;font-size:.88rem}
    .file-input-wrapper{position:relative;display:inline-block}
    .file-input-wrapper input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer}
    #capture-canvas{display:none}

<script>
// ═══════════════════════════════════════
// DEBUG LOGGER — visible on screen
// ═══════════════════════════════════════
const DBG = {
  el: null,
  init() { this.el = document.getElementById('debug-log'); this.el.classList.add('visible'); },
  log(msg, type = 'info') {
    if (!this.el) return;
    const line = document.createElement('div');
    line.className = 'log-line log-' + type;
    line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    this.el.appendChild(line);
    this.el.scrollTop = this.el.scrollHeight;
    console.log(`[${type}] ${msg}`);
  },
  ok(m) { this.log(m, 'ok'); },
  warn(m) { this.log(m, 'warn'); },
  err(m) { this.log(m, 'err'); },
  info(m) { this.log(m, 'info'); },
};

// ═══════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════
(async function main() {
  // Wait for DOM
  if (document.readyState === 'loading') {
    await new Promise(r => document.addEventListener('DOMContentLoaded', r));
  }

  DBG.init();
  DBG.info('App starting…');

  // ─── Device Detection & Debug ───
  const ua = navigator.userAgent;
  const isIOS = /iPad|iPhone|iPod/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  const isAndroid = /Android/.test(ua);
  const isSafari = /Safari/.test(ua) && !/Chrome/.test(ua) && !/CriOS/.test(ua);
  const isChrome = /Chrome|CriOS/.test(ua);
  const isFirefox = /FxiOS|Firefox/.test(ua);
  const isSamsung = /SamsungBrowser/.test(ua);

  // OS version
  let osVersion = '?';
  if (isIOS) {
    const m = ua.match(/OS (\d+[_\.]\d+[_\.]?\d*)/);
    osVersion = m ? m[1].replace(/_/g, '.') : '?';
  } else if (isAndroid) {
    const m = ua.match(/Android (\d+\.?\d*\.?\d*)/);
    osVersion = m ? m[1] : '?';
  }

  // Browser version
  let browser = 'Unknown';
  if (isSamsung) { const m = ua.match(/SamsungBrowser\/([\d.]+)/); browser = 'Samsung ' + (m?m[1]:'?'); }
  else if (isChrome) { const m = ua.match(/(?:Chrome|CriOS)\/([\d.]+)/); browser = 'Chrome ' + (m?m[1]:'?'); }
  else if (isSafari) { const m = ua.match(/Version\/([\d.]+)/); browser = 'Safari ' + (m?m[1]:'?'); }
  else if (isFirefox) { const m = ua.match(/(?:FxiOS|Firefox)\/([\d.]+)/); browser = 'Firefox ' + (m?m[1]:'?'); }

  const platform = isIOS ? '🍎 iOS' : isAndroid ? '🤖 Android' : '💻 ' + navigator.platform;

  DBG.info(`${platform} ${osVersion} — ${browser}`);
  DBG.info('UA: ' + ua.substring(0, 100));
  DBG.info('Screen: ' + screen.width + 'x' + screen.height + ' @' + devicePixelRatio + 'x');
  DBG.info('Secure: ' + location.protocol + ' | SW: ' + ('serviceWorker' in navigator));

  // API availability check
  DBG.info('── API Support ──');
  DBG.info('getUserMedia: ' + (!!navigator.mediaDevices?.getUserMedia ? '✓' : '✗'));
  DBG.info('BarcodeDetector: ' + ('BarcodeDetector' in window ? '✓' : '✗'));
  DBG.info('OffscreenCanvas: ' + ('OffscreenCanvas' in window ? '✓' : '✗'));
  DBG.info('WASM: ' + (typeof WebAssembly === 'object' ? '✓' : '✗'));
  DBG.info('Clipboard: ' + (!!navigator.clipboard ? '✓' : '✗'));
  DBG.info('Vibration: ' + (!!navigator.vibrate ? '✓' : '✗'));

  if (isIOS) {
    DBG.warn('iOS détecté — BarcodeDetector absent, fallback WASM');
    if (isSafari) DBG.info('Safari iOS — getUserMedia OK depuis iOS 11+');
    else if (isChrome) DBG.warn('Chrome iOS = WebKit — mêmes limites que Safari');
    else if (isFirefox) DBG.warn('Firefox iOS = WebKit — mêmes limites que Safari');
  }
  if (isAndroid) {
    if (isChrome) DBG.ok('Chrome Android — BarcodeDetector natif attendu');
    else if (isSamsung) DBG.warn('Samsung Browser — BarcodeDetector peut manquer');
    else if (isFirefox) DBG.warn('Firefox Android — pas de BarcodeDetector');
  }

  const video = document.getElementById('video');
  const captureCanvas = document.getElementById('capture-canvas');
  const captureCtx = captureCanvas.getContext('2d', { willReadFrequently: true });
  const statusDot = document.getElementById('status-dot');
  const statusMsg = document.getElementById('status-msg');
  const fpsCounter = document.getElementById('fps-counter');
  const resultsPanel = document.getElementById('results-panel');
  const resultsBody = document.getElementById('results-body');
  const engineBadge = document.getElementById('engine-badge');

  let stream = null;
  let nativeDetector = null;
  let useNative = false;
  let useZbar = false;
  let scanning = false;
  let torchOn = false;
  let lastRawResult = '';
  let scanRafId = null;

  // ─── STEP 1: Detect engine ───
  DBG.info('── Step 1: Decoder Engine ──');
  if ('BarcodeDetector' in window) {
    DBG.ok('BarcodeDetector exists');
    try {
      const formats = await BarcodeDetector.getSupportedFormats();
      DBG.info('Formats (' + formats.length + '): ' + formats.join(', '));
      if (formats.includes('data_matrix')) {
        nativeDetector = new BarcodeDetector({ formats: ['data_matrix'] });
        useNative = true;
        engineBadge.textContent = 'Native';
        engineBadge.style.color = 'var(--accent)';
        DBG.ok('✓ Native DataMatrix — best performance');
      } else {
        DBG.warn('data_matrix absent! Formats dispo: ' + formats.join(', '));
        if (isAndroid && !isChrome) DBG.warn('Essayez Chrome pour le support natif');
      }
    } catch(e) {
      DBG.err('getSupportedFormats error: ' + e.message);
    }
  } else {
    DBG.warn('BarcodeDetector absent');
    if (isIOS) DBG.info('Normal sur iOS — Apple ne supporte pas cette API');
    if (isAndroid && isFirefox) DBG.info('Normal sur Firefox Android');
  }

  // ─── STEP 1b: Load barcode-detector polyfill if needed ───
  let polyfillDetector = null;

  if (!useNative) {
    DBG.info('── Step 1b: Polyfill BarcodeDetector ──');
    if (typeof WebAssembly !== 'object') {
      DBG.err('WebAssembly non supporté — scan impossible');
    } else {
      engineBadge.textContent = 'WASM…';

      // barcode-detector v2 is a proper ESM polyfill using zbar.wasm internally
      const cdns = [
        'https://cdn.jsdelivr.net/npm/barcode-detector@2/dist/es/pure.min.js',
        'https://unpkg.com/barcode-detector@2/dist/es/pure.min.js',
        'https://esm.sh/barcode-detector@2?bundle',
      ];

      for (const url of cdns) {
        if (useZbar) break;
        try {
          const cdnName = url.split('/')[2];
          DBG.info('import() from ' + cdnName + '…');
          const module = await Promise.race([
            import(url),
            new Promise((_, rej) => setTimeout(() => rej(new Error('timeout 15s')), 15000)),
          ]);

          DBG.info('Module keys: ' + Object.keys(module).join(', '));

          // Get the BarcodeDetector class from the module
          const Detector = module.BarcodeDetector || module.default?.BarcodeDetector || module.default;

          if (Detector && typeof Detector === 'function') {
            DBG.info('BarcodeDetector polyfill found, checking formats…');

            // Check supported formats
            if (Detector.getSupportedFormats) {
              const fmts = await Detector.getSupportedFormats();
              DBG.info('Polyfill formats: ' + fmts.join(', '));
            }

            polyfillDetector = new Detector({ formats: ['data_matrix'] });

            // Quick test: make sure detect() is callable
            if (typeof polyfillDetector.detect === 'function') {
              useZbar = true;
              engineBadge.textContent = 'WASM';
              engineBadge.style.color = 'var(--warning)';
              DBG.ok('✓ Polyfill BarcodeDetector ready (data_matrix)');
            } else {
              DBG.warn('Detector created but detect() not found');
              polyfillDetector = null;
            }
          } else {
            DBG.warn('No BarcodeDetector class in module');
            for (const key of Object.keys(module)) {
              DBG.info('  module.' + key + ' = ' + typeof module[key]);
            }
          }
        } catch(e) {
          DBG.warn(cdns.indexOf(url) < cdns.length - 1 ? 'Failed, trying next CDN…' : 'All CDNs failed');
          DBG.warn('  Error: ' + e.message);
        }
      }

      if (!useZbar) {
        engineBadge.textContent = 'Manuel';
        engineBadge.style.color = 'var(--danger)';
        DBG.warn('Aucun décodeur auto — capture manuelle uniquement');
      }
    }
  }

  // ─── STEP 2: Start camera ───
  DBG.info('── Step 2: Camera ──');
  try {
    // List available cameras
    try {
      const devices = await navigator.mediaDevices.enumerateDevices();
      const cams = devices.filter(d => d.kind === 'videoinput');
      DBG.info('Cameras found: ' + cams.length);
      cams.forEach((c, i) => DBG.info(`  cam${i}: ${c.label || '(no label)'} id=${c.deviceId.substring(0,8)}…`));
    } catch(e) {
      DBG.warn('enumerateDevices failed: ' + e.message);
    }

    const constraints = {
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false,
    };
    DBG.info('Requesting getUserMedia…');

    stream = await navigator.mediaDevices.getUserMedia(constraints);
    const track = stream.getVideoTracks()[0];
    DBG.ok('getUserMedia OK');
    DBG.info('Track: ' + track.label);
    DBG.info('Track state: ' + track.readyState + ' enabled=' + track.enabled + ' muted=' + track.muted);

    // Track settings (actual resolution, etc)
    const settings = track.getSettings?.() || {};
    DBG.info(`Settings: ${settings.width}x${settings.height} facing=${settings.facingMode || '?'} fps=${settings.frameRate || '?'}`);

    // Capabilities
    const caps = track.getCapabilities?.() || {};
    DBG.info('Torch: ' + (caps.torch ? '✓' : '✗'));
    DBG.info('Focus: ' + (caps.focusMode ? caps.focusMode.join(',') : '✗'));
    if (isIOS) DBG.info('iOS note: getCapabilities may be incomplete on Safari');

    video.srcObject = stream;
    DBG.info('srcObject set — readyState=' + video.readyState);

    // Fire play without await
    video.play().then(() => {
      DBG.ok('video.play() resolved — readyState=' + video.readyState);
    }).catch(e => {
      DBG.err('video.play() FAILED: ' + e.name + ': ' + e.message);
      if (isIOS) DBG.warn('iOS: play() peut échouer sans interaction user');
    });

    // Poll for videoWidth
    DBG.info('Polling videoWidth…');
    let attempts = 0;
    while (video.videoWidth === 0 && attempts < 60) {
      await sleep(100);
      attempts++;
      if (attempts % 10 === 0) {
        DBG.info(`  …${attempts * 100}ms readyState=${video.readyState} paused=${video.paused} width=${video.videoWidth}`);
      }
    }

    const vw = video.videoWidth;
    const vh = video.videoHeight;

    if (vw === 0) {
      DBG.err(`Video stuck at 0px after ${attempts * 100}ms!`);
      DBG.err('readyState=' + video.readyState + ' networkState=' + video.networkState);
      DBG.err('paused=' + video.paused + ' ended=' + video.ended);
      DBG.err('error=' + (video.error ? JSON.stringify(video.error) : 'null'));
      DBG.err('srcObject tracks: ' + (video.srcObject?.getVideoTracks?.()?.length ?? 'N/A'));
      if (isIOS) {
        DBG.err('iOS FIX: Essayez de toucher l\'écran (autoplay policy)');
        DBG.err('iOS: playsinline=' + video.hasAttribute('playsinline'));
        DBG.err('iOS: muted=' + video.muted + ' autoplay=' + video.autoplay);
      }
      if (isAndroid) {
        DBG.err('Android: vérifiez permissions caméra dans les paramètres Chrome');
      }
      setStatus('error', 'Vidéo bloquée — voir 🐛 debug');
      captureCanvas.width = 1280;
      captureCanvas.height = 720;
    } else {
      DBG.ok(`Video ready: ${vw}x${vh} in ${attempts * 100}ms`);
      captureCanvas.width = vw;
      captureCanvas.height = vh;
    }
  } catch(err) {
    DBG.err('Camera FATAL: ' + err.name + ': ' + err.message);
    if (err.name === 'NotAllowedError') {
      DBG.err('Permission refusée — l\'utilisateur a bloqué la caméra');
      if (isIOS) DBG.err('iOS: Réglages > Safari > Caméra > Autoriser');
      if (isAndroid) DBG.err('Android: Touchez l\'icône 🔒 dans la barre d\'URL');
    } else if (err.name === 'NotFoundError') {
      DBG.err('Aucune caméra trouvée');
    } else if (err.name === 'NotReadableError') {
      DBG.err('Caméra utilisée par une autre app');
    } else if (err.name === 'OverconstrainedError') {
      DBG.err('Contraintes impossibles: ' + err.constraint);
    }
    setStatus('error', err.name + ': ' + err.message);
  }

  // ─── STEP 3: Start scanning ───
  DBG.info('── Step 3: Scan Loop ──');
  DBG.info('useNative=' + useNative + ' useZbar=' + useZbar);
  DBG.info('canvas=' + captureCanvas.width + 'x' + captureCanvas.height);
  DBG.info('video.videoWidth=' + video.videoWidth + ' readyState=' + video.readyState);
  setStatus('scanning', 'Placez le 2D-Doc dans le cadre');
  startScanning();

  // ─── STEP 4: Setup UI events ───
  setupEvents();

  // Summary
  DBG.info('── Summary ──');
  DBG.info(`${platform} ${osVersion} | ${browser}`);
  DBG.info(`Engine: ${useNative ? 'Native ✓' : useZbar ? 'WASM ✓' : 'NONE ✗'}`);
  DBG.info(`Camera: ${video.videoWidth > 0 ? video.videoWidth + 'x' + video.videoHeight + ' ✓' : 'BLOCKED ✗'}`);
  DBG.info(`Scanning: ${scanning ? 'Active ✓' : 'Inactive ✗'}`);
  if (video.videoWidth > 0 && (useNative || useZbar)) {
    DBG.ok('🚀 Tout OK — prêt à scanner !');
  } else {
    DBG.err('⚠ Problème détecté — consultez les logs ci-dessus');
  }

  // Auto-hide debug after 15s if no error
  setTimeout(() => {
    const debugLog = document.getElementById('debug-log');
    if (debugLog && !debugLog.querySelector('.log-err')) {
      debugLog.classList.remove('visible');
    }
  }, 15000);

  // ═══════════════════════════════════════
  // Functions
  // ═══════════════════════════════════════

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  function setStatus(type, msg) {
    statusDot.className = 'status-dot';
    if (type === 'error') statusDot.classList.add('error');
    statusMsg.textContent = msg;
  }

  function vibrate() { try { navigator.vibrate?.([100,50,100]); } catch(e){} }

  // ─── Scanning ───
  function startScanning() {
    if (scanning) return;
    if (!useNative && !useZbar) {
      DBG.warn('No decoder available — manual capture only');
      setStatus('warning', 'Scan auto indisponible — utilisez capture');
      return;
    }
    scanning = true;
    DBG.ok('Scan loop started (engine: ' + (useNative ? 'native' : 'zbar') + ')');

    let fc = 0, lastFps = performance.now(), lastScan = 0;
    const interval = useZbar ? 300 : 50;

    function loop(ts) {
      if (!scanning) return;
      if (ts - lastScan < interval) { scanRafId = requestAnimationFrame(loop); return; }
      lastScan = ts;

      try {
        if (video.videoWidth === 0) { scanRafId = requestAnimationFrame(loop); return; }

        captureCtx.drawImage(video, 0, 0, captureCanvas.width, captureCanvas.height);

        tryDecode(captureCanvas).then(raw => {
          if (!raw) return tryDecode(enhance(captureCanvas));
          return raw;
        }).then(raw => {
          if (!raw) return tryDecode(cropCenter(captureCanvas, 0.55));
          return raw;
        }).then(raw => {
          if (raw && raw.length > 10 && scanning) {
            scanning = false;
            DBG.ok('DECODED! Length=' + raw.length);
            vibrate();
            handleResult(raw);
          }
        }).catch(() => {});

        fc++;
        if (performance.now() - lastFps >= 1000) {
          fpsCounter.textContent = `${fc} scan/s`;
          fc = 0; lastFps = performance.now();
        }
      } catch(e) {}

      if (scanning) scanRafId = requestAnimationFrame(loop);
    }

    scanRafId = requestAnimationFrame(loop);
  }

  function stopScanning() { scanning = false; if (scanRafId) cancelAnimationFrame(scanRafId); }

  async function tryDecode(canvas) {
    // Try native first
    if (useNative && nativeDetector) {
      try {
        const results = await nativeDetector.detect(canvas);
        if (results.length > 0 && results[0].rawValue?.length > 5) return results[0].rawValue;
      } catch(e) {}
    }
    // Then polyfill (same BarcodeDetector API)
    if (useZbar && polyfillDetector) {
      try {
        const results = await polyfillDetector.detect(canvas);
        if (results?.length > 0) {
          for (const r of results) {
            const val = r.rawValue || '';
            if (val.length > 5) return val;
          }
        }
      } catch(e) {
        DBG.warn('Polyfill decode error: ' + e.message);
      }
    }
    return null;
  }

  function enhance(src) {
    const c = document.createElement('canvas');
    c.width = src.width; c.height = src.height;
    const ctx = c.getContext('2d');
    ctx.filter = 'contrast(2) grayscale(1) brightness(1.1)';
    ctx.drawImage(src, 0, 0);
    return c;
  }

  function cropCenter(src, ratio) {
    const size = Math.min(src.width, src.height) * ratio;
    const x = (src.width - size) / 2, y = (src.height - size) / 2;
    const c = document.createElement('canvas');
    c.width = size; c.height = size;
    c.getContext('2d').drawImage(src, x, y, size, size, 0, 0, size, size);
    return c;
  }

  function binarize(src) {
    const c = document.createElement('canvas');
    c.width = src.width; c.height = src.height;
    const ctx = c.getContext('2d', { willReadFrequently: true });
    ctx.filter = 'contrast(3) grayscale(1) brightness(1.2)';
    ctx.drawImage(src, 0, 0); ctx.filter = 'none';
    const id = ctx.getImageData(0, 0, c.width, c.height);
    const d = id.data;
    for (let i = 0; i < d.length; i += 4) {
      const g = d[i]*.299 + d[i+1]*.587 + d[i+2]*.114;
      d[i] = d[i+1] = d[i+2] = g > 128 ? 255 : 0;
    }
    ctx.putImageData(id, 0, 0);
    return c;
  }

  // ─── Manual Capture ───
  async function captureAndDecode() {
    if (video.videoWidth === 0) { DBG.err('captureAndDecode: videoWidth=0'); return; }
    setStatus('scanning', 'Analyse…');
    DBG.info('Manual capture…');
    captureCtx.drawImage(video, 0, 0, captureCanvas.width, captureCanvas.height);

    const variants = [
      captureCanvas,
      enhance(captureCanvas),
      cropCenter(captureCanvas, 0.55),
      binarize(captureCanvas),
      binarize(cropCenter(captureCanvas, 0.55)),
    ];

    for (let i = 0; i < variants.length; i++) {
      const raw = await tryDecode(variants[i]);
      if (raw && raw.length > 10) {
        DBG.ok('Manual decode OK on variant ' + i);
        vibrate(); handleResult(raw); return;
      }
    }

    DBG.warn('Manual capture: nothing found in ' + variants.length + ' variants');
    setStatus('error', 'Aucun 2D-Doc détecté');
    setTimeout(() => setStatus('scanning', 'Placez le 2D-Doc dans le cadre'), 2500);
  }

  // ─── File Input ───
  async function decodeFromFile(file) {
    DBG.info('Decoding from file: ' + file.name);
    const img = new Image();
    img.onload = async () => {
      captureCanvas.width = img.naturalWidth;
      captureCanvas.height = img.naturalHeight;
      captureCtx.drawImage(img, 0, 0);
      DBG.info('Image loaded: ' + img.naturalWidth + 'x' + img.naturalHeight);

      const variants = [captureCanvas, enhance(captureCanvas), binarize(captureCanvas), cropCenter(captureCanvas, 0.6), binarize(cropCenter(captureCanvas, 0.6))];
      for (const v of variants) {
        const raw = await tryDecode(v);
        if (raw && raw.length > 10) { DBG.ok('File decode OK'); vibrate(); handleResult(raw); return; }
      }
      DBG.warn('File decode: nothing found');
      setStatus('error', 'Aucun 2D-Doc dans l\'image');
      setTimeout(() => setStatus('scanning', 'Placez le 2D-Doc dans le cadre'), 2500);
    };
    img.onerror = () => { DBG.err('Image load error'); };
    img.src = URL.createObjectURL(file);
  }

  // ─── Handle Result ───
  function handleResult(raw) {
    lastRawResult = raw;
    stopScanning();
    renderResults(raw, parse2DDoc(raw));
    resultsPanel.classList.add('open');
  }

  // ═══════════════════════════════════════
  // 2D-Doc Parser
  // ═══════════════════════════════════════

  function parse2DDoc(raw) {
    const res = { isValid: false, header: {}, fields: [], signature: null, raw };
    try {
      let pos = 0;
      let hStart = -1;
      for (let i = 0; i < Math.min(10, raw.length - 1); i++) {
        if (raw[i] === 'D' && raw[i+1] === 'C') { hStart = i; break; }
      }

      if (hStart >= 0) { pos = hStart + 2; res.header.marker = 'DC'; res.isValid = true; }
      else if (/^0[1-4]/.test(raw)) { res.isValid = true; }

      if (res.isValid) {
        res.header.version = raw.substring(pos, pos + 2); pos += 2;
        const ver = parseInt(res.header.version, 10);
        if (ver >= 1 && ver <= 4) {
          res.header.caId = raw.substring(pos, pos + 4); pos += 4;
          res.header.certId = raw.substring(pos, pos + 4); pos += 4;
          res.header.emissionDate = hexDate(raw.substring(pos, pos + 4)); pos += 4;
          res.header.signatureDate = hexDate(raw.substring(pos, pos + 4)); pos += 4;
          res.header.docTypeId = raw.substring(pos, pos + 2); pos += 2;
        }
      }

      const rest = raw.substring(pos);
      let sigIdx = -1;
      for (let i = rest.length - 1; i >= 0; i--) {
        if (rest[i] === '\x1E' || rest[i] === '\x1D') {
          if (rest.length - i - 1 >= 40) { sigIdx = i; break; }
        }
      }

      let msg = sigIdx >= 0 ? rest.substring(0, sigIdx) : rest;
      if (sigIdx >= 0) res.signature = rest.substring(sigIdx + 1);

      const parts = msg.split(/[\x1D\x1E\x1F]/);
      for (const p of parts) {
        if (p.length < 3) continue;
        const tag = p.substring(0, 2).toUpperCase();
        const val = p.substring(2);
        const known = TAGS[tag];
        res.fields.push({ tag, label: known?.label || `Champ ${tag}`, value: val });
      }
    } catch(e) { res.parseError = e.message; }
    return res;
  }

  function hexDate(hex) {
    const d = parseInt(hex, 16);
    if (isNaN(d) || d > 36500) return hex;
    return new Date(2000, 0, 1 + d).toLocaleDateString('fr-FR');
  }

  const TAGS = {
    '01':{label:'Ligne identité 1'},'02':{label:'Ligne identité 2'},'03':{label:'Ligne identité 3'},
    '04':{label:'Ligne identité 4'},'05':{label:'Ligne identité 5'},
    '06':{label:'Point de remise'},'07':{label:'Code postal'},'08':{label:'Ville'},'09':{label:'Pays'},
    '0A':{label:'Téléphone'},'0B':{label:'Email'},
    '10':{label:'Adresse L1'},'11':{label:'Adresse L2'},'12':{label:'Adresse L3'},'13':{label:'Adresse L4'},
    '14':{label:'Adresse L5'},'15':{label:'Adresse L6'},'16':{label:'Adresse L7'},
    '17':{label:'Qualité/Titre'},'18':{label:'Prénom(s)'},'19':{label:'Nom'},
    '1A':{label:'Complément nom'},'1B':{label:'Date naissance'},'1C':{label:'Lieu naissance'},
    '1D':{label:'Sexe'},'1E':{label:'Nationalité'},
    '20':{label:'Identifiant RH'},'21':{label:'N° Sécu (NIR)'},
    '22':{label:'Période début'},'23':{label:'Période fin'},'24':{label:'Date paiement'},
    '25':{label:'Net fiscal'},'26':{label:'Net à payer'},'27':{label:'Cumul net imposable'},
    '28':{label:'Heures travaillées'},'29':{label:'SIRET employeur'},'2A':{label:'Raison sociale'},
    '30':{label:'N° facture'},'31':{label:'N° client'},'32':{label:'N° contrat'},
    '33':{label:'Point de service'},'34':{label:'Montant TTC'},'35':{label:'Date facture'},
    '36':{label:'Date limite paiement'},'37':{label:'SIREN fournisseur'},'38':{label:'Nom fournisseur'},
    '39':{label:'Type énergie'},'3A':{label:'Période début fact.'},'3B':{label:'Période fin fact.'},
    '40':{label:'Revenu fiscal réf.'},'41':{label:'Nbre parts'},'42':{label:'Année revenus'},
    '43':{label:'N° fiscal'},'44':{label:'Réf. avis'},'45':{label:'Montant impôt'},
    '46':{label:'Situation famille'},'47':{label:'Pers. à charge'},
    '50':{label:'Immatriculation'},'51':{label:'Date immat.'},'52':{label:'Titulaire'},
    '53':{label:'Marque'},'54':{label:'Modèle'},'55':{label:'N° VIN'},
  };

  const DOC_TYPES = {
    '00':'Justificatif de domicile','01':'Justificatif de domicile','02':'Facture',
    '03':'Avis d\'imposition','04':'Titre d\'identité','05':'Carte grise',
    '06':'Diplôme','07':'Carte Vitale','08':'RIB','09':'Bulletin de salaire',
  };

  // ─── Render Results ───
  function renderResults(raw, p) {
    let h = '';
    h += p.isValid
      ? '<div class="result-badge success">✓ 2D-Doc détecté</div>'
      : '<div class="result-badge warning">⚠ Format non standard</div>';

    if (p.header.version) {
      const hd = p.header;
      h += `<div class="field-card" style="margin-bottom:16px">
        <div class="field-tag">EN-TÊTE</div>
        <div class="field-label">Version ${hd.version} ${hd.marker||''}</div>
        ${hd.caId ? `<div class="field-label">CA: ${hd.caId} — Cert: ${hd.certId}</div>` : ''}
        ${hd.emissionDate ? `<div class="field-label">Émis: ${hd.emissionDate} — Signé: ${hd.signatureDate}</div>` : ''}
        ${hd.docTypeId ? `<div class="field-value" style="margin-top:6px">${DOC_TYPES[hd.docTypeId] || 'Type ' + hd.docTypeId}</div>` : ''}
      </div>`;
    }

    if (p.fields.length) {
      h += '<div class="fields-grid">';
      for (const f of p.fields) {
        let v = f.value;
        if (/montant|net|impôt|revenu/i.test(f.label)) {
          const n = parseInt(v, 10);
          if (!isNaN(n) && n > 0) v = (n/100).toLocaleString('fr-FR',{style:'currency',currency:'EUR'});
        }
        h += `<div class="field-card"><div class="field-tag">${f.tag}</div><div class="field-label">${f.label}</div><div class="field-value">${esc(v)}</div></div>`;
      }
      h += '</div>';
    }

    h += `<div class="raw-data" style="margin-top:20px"><div class="raw-data-label">Brut — ${raw.length} car.</div><pre>${esc(fmtRaw(raw))}</pre></div>`;

```
if (p.signature) {
  h += `<div class="raw-data"><div class="raw-data-label">Signature (${p.signature.length})</div><pre style="color:var(--warning)">${esc(p.signature.substring(0,120))}…</pre></div>`;
}
resultsBody.innerHTML = h;
```

}

function esc(s) { return s.replace(/&/g,’&’).replace(/</g,’<’).replace(/>/g,’>’); }
function fmtRaw(s) {
return s.replace(/[\x00-\x1F]/g, c => {
const n = c.charCodeAt(0);
return {0x1D:’⟨GS⟩’,0x1E:’⟨RS⟩’,0x1F:’⟨US⟩’,0x04:’⟨EOT⟩’}[n] || `⟨${n.toString(16).padStart(2,'0')}⟩`;
});
}

// ─── Torch ───
async function toggleTorch() {
if (!stream) return;
const track = stream.getVideoTracks()[0];
if (!track.getCapabilities?.()?.torch) { DBG.warn(‘Torch not supported’); return; }
torchOn = !torchOn;
await track.applyConstraints({ advanced: [{ torch: torchOn }] });
document.getElementById(‘btn-torch’).classList.toggle(‘active’, torchOn);
}

// ─── UI Events ───
function setupEvents() {
document.getElementById(‘btn-torch’).addEventListener(‘click’, toggleTorch);
document.getElementById(‘btn-capture’).addEventListener(‘click’, captureAndDecode);
document.getElementById(‘file-input’).addEventListener(‘change’, e => {
if (e.target.files?.[0]) decodeFromFile(e.target.files[0]);
e.target.value = ‘’;
});
document.getElementById(‘btn-close-results’).addEventListener(‘click’, closeResults);
document.getElementById(‘btn-rescan’).addEventListener(‘click’, closeResults);
document.getElementById(‘btn-copy’).addEventListener(‘click’, () => {
navigator.clipboard.writeText(lastRawResult).then(() => {
const btn = document.getElementById(‘btn-copy’);
btn.textContent = ‘Copié ✓’;
setTimeout(() => btn.textContent = ‘Copier’, 1500);
});
});
}

function closeResults() {
resultsPanel.classList.remove(‘open’);
if (video.videoWidth > 0) {
captureCanvas.width = video.videoWidth;
captureCanvas.height = video.videoHeight;
}
setTimeout(startScanning, 300);
}
})();

// Service Worker
if (‘serviceWorker’ in navigator) navigator.serviceWorker.register(‘sw.js’).catch(()=>{});
</script>
