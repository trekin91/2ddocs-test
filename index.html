<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0b1120">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <title>MediScan</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#0b1120;--bg2:#111827;--bg3:#1a2436;
      --border:#1e3048;--border-hi:#2a4a6b;
      --text:#e2eaf4;--text-dim:#7a96b5;--text-muted:#3d5875;
      --pri:#5cb4f0;--pri-dim:#5cb4f012;--pri-glow:#5cb4f035;--pri-deep:#3a8fd4;
      --sky:#8ad4ff;
      --amber:#fbbf24;--amber-dim:#fbbf2412;--amber-brd:#fbbf2420;
      --red:#f87171;--red-dim:#f8717112;--red-brd:#f8717120;
      --green:#4ade80;--green-dim:#4ade8012;--green-brd:#4ade8020;
      --radius:14px;--radius-sm:10px;
    }
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden;-webkit-tap-highlight-color:transparent}
    .app{display:flex;flex-direction:column;height:100dvh;max-width:500px;margin:0 auto}

    /* Header */
    .header{padding:14px 20px;display:flex;align-items:center;gap:12px;z-index:10;background:var(--bg)}
    .logo{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--pri),var(--pri-deep));display:grid;place-items:center;flex-shrink:0;box-shadow:0 3px 14px var(--pri-glow)}
    .logo svg{width:20px;height:20px}
    .hdr-text h1{font-size:1.05rem;font-weight:700;letter-spacing:-.02em;line-height:1.15}
    .hdr-text h1 span{color:var(--pri);font-weight:300}
    .hdr-text small{font-size:.64rem;color:var(--text-dim);font-weight:400}
    .pill{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:.6rem;padding:4px 10px;border-radius:20px;background:var(--bg3);border:1px solid var(--border);color:var(--text-dim);font-family:'IBM Plex Mono',monospace;transition:all .4s;white-space:nowrap}
    .pill .dot{width:6px;height:6px;border-radius:50%;transition:all .4s}
    .pill.ok .dot{background:var(--pri);box-shadow:0 0 8px var(--pri-glow)}
    .pill.ok{color:var(--pri);border-color:var(--pri-glow)}
    .pill.loading .dot{background:var(--amber);animation:blink 1.2s ease infinite}
    .pill.err .dot{background:var(--red)}.pill.err{color:var(--red)}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}

    /* Camera */
    .camera{position:relative;flex:1;background:#000;overflow:hidden}
    #video{width:100%;height:100%;object-fit:cover}
    .ov{position:absolute;inset:0;pointer-events:none}
    .vig{position:absolute;inset:0;background:radial-gradient(circle 250px at 50% 46%,transparent 28%,rgba(11,17,32,.8) 72%)}
    .frame{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:195px;height:195px}
    .frame-b{position:absolute;inset:0;border:1.5px solid rgba(92,180,240,.2);border-radius:16px}
    .frame .c{position:absolute;width:22px;height:22px;border-style:solid;border-color:var(--pri)}
    .c.tl{top:-1px;left:-1px;border-width:2.5px 0 0 2.5px;border-radius:9px 0 0 0}
    .c.tr{top:-1px;right:-1px;border-width:2.5px 2.5px 0 0;border-radius:0 9px 0 0}
    .c.bl{bottom:-1px;left:-1px;border-width:0 0 2.5px 2.5px;border-radius:0 0 0 9px}
    .c.br{bottom:-1px;right:-1px;border-width:0 2.5px 2.5px 0;border-radius:0 0 9px 0}
    .sweep{position:absolute;left:10%;width:80%;height:1.5px;background:linear-gradient(90deg,transparent,var(--sky),transparent);box-shadow:0 0 14px var(--pri-glow);border-radius:2px;animation:sw 2.4s ease-in-out infinite}
    @keyframes sw{0%,100%{top:6%;opacity:.25}50%{top:92%;opacity:.85}}
    .flash{position:absolute;inset:0;background:var(--pri);opacity:0;transition:opacity .12s;pointer-events:none}
    .flash.on{opacity:.18;transition:none}
    .hint{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);font-size:.7rem;color:var(--text-dim);background:rgba(11,17,32,.8);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);padding:7px 16px;border-radius:20px;white-space:nowrap;border:1px solid var(--border)}

    /* Controls */
    .controls{padding:12px 20px;background:var(--bg);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:16px}
    .btn{border:none;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:8px}
    .btn:active{transform:scale(.93)}
    .btn-r{width:46px;height:46px;border-radius:50%;display:grid;place-items:center;background:var(--bg3);color:var(--text-dim);border:1px solid var(--border)}
    .btn-r svg{width:19px;height:19px}
    .btn-r.active{background:var(--pri-dim);color:var(--pri);border-color:var(--pri-glow)}
    .btn-main{width:64px;height:64px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,var(--pri),var(--pri-deep));color:#0b1120;border:3px solid var(--bg);box-shadow:0 0 0 2px var(--pri),0 4px 18px var(--pri-glow)}
    .btn-main svg{width:26px;height:26px}
    .fw{position:relative;display:inline-block}
    .fw input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer}

    /* Results */
    .res{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .4s cubic-bezier(.16,1,.3,1)}
    .res.open{transform:translateY(0)}
    .res-head{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
    .res-head h2{font-size:1rem;font-weight:700}
    .btn-x{width:32px;height:32px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:50%;display:grid;place-items:center;cursor:pointer;font-size:1rem}
    .res-body{flex:1;overflow-y:auto;padding:20px;-webkit-overflow-scrolling:touch}
    .res-foot{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:10px}
    .res-foot .btn{flex:1;justify-content:center;font-weight:600;border-radius:12px;padding:13px 0;font-size:.88rem}
    .btn-gh{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
    .btn-pr{background:linear-gradient(135deg,var(--pri),var(--pri-deep));color:#0b1120;border:none}

    /* Cards */
    .hero{background:linear-gradient(145deg,var(--pri-dim),rgba(56,189,248,.06));border:1px solid var(--border-hi);border-radius:var(--radius);padding:20px;margin-bottom:16px;position:relative;overflow:hidden}
    .hero::before{content:'';position:absolute;top:-40px;right:-40px;width:120px;height:120px;background:radial-gradient(circle,var(--pri-glow),transparent 70%);pointer-events:none}
    .hero .type-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;font-size:.66rem;font-weight:600;margin-bottom:10px}
    .type-badge.human{background:#a78bfa18;color:#a78bfa;border:1px solid #a78bfa20}
    .type-badge.vet{background:#4ade8012;color:var(--green);border:1px solid var(--green-brd)}
    .type-badge.unknown{background:var(--bg3);color:var(--text-dim);border:1px solid var(--border)}
    .hero .gtin{font-family:'IBM Plex Mono',monospace;font-size:.68rem;color:var(--pri);font-weight:500;margin-bottom:6px}
    .hero .med-name{font-size:1.08rem;font-weight:700;line-height:1.35;margin-bottom:4px}
    .hero .med-sub{font-size:.76rem;color:var(--text-dim);line-height:1.3;margin-bottom:14px}
    .hero .med-loading{font-size:.76rem;color:var(--text-dim);font-style:italic;margin-bottom:14px}
    .meta{display:flex;gap:8px;flex-wrap:wrap}
    .chip{display:flex;align-items:center;gap:6px;background:rgba(11,17,32,.6);border:1px solid var(--border);border-radius:8px;padding:7px 11px;font-size:.76rem}
    .chip .lb{color:var(--text-dim);font-size:.58rem;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
    .chip strong{font-weight:600}
    .chip.exp strong{color:var(--amber)}
    .exp-bar{margin-top:14px;padding:10px 14px;border-radius:10px;font-size:.76rem;font-weight:600;display:flex;align-items:center;gap:8px}
    .exp-bar.valid{background:var(--green-dim);color:var(--green);border:1px solid var(--green-brd)}
    .exp-bar.warn{background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber-brd)}
    .exp-bar.expired{background:var(--red-dim);color:var(--red);border:1px solid var(--red-brd)}

    .stitle{font-size:.64rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin:20px 0 8px}
    .fields{display:flex;flex-direction:column;gap:5px}
    .fd{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 13px;display:flex;justify-content:space-between;align-items:baseline;gap:10px}
    .fd-l{flex:1;min-width:0}
    .fd-ai{font-family:'IBM Plex Mono',monospace;font-size:.58rem;color:var(--pri);font-weight:500}
    .fd-lb{font-size:.7rem;color:var(--text-dim)}
    .fd-v{font-size:.88rem;font-weight:600;word-break:break-word;text-align:right;font-family:'IBM Plex Mono',monospace}
    .raw{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-top:5px}
    .raw-lb{font-size:.58rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:5px}
    .raw pre{font-family:'IBM Plex Mono',monospace;font-size:.68rem;color:var(--pri);white-space:pre-wrap;word-break:break-all;line-height:1.6}

    #capture-canvas{display:none}
    @supports(padding-top:env(safe-area-inset-top)){
      .header{padding-top:calc(14px + env(safe-area-inset-top))}
      .res-foot{padding-bottom:calc(12px + env(safe-area-inset-bottom))}
      .controls{padding-bottom:calc(12px + env(safe-area-inset-bottom))}
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="#0b1120" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3C4.24 3 2 5.69 2 9c0 3.92 3.18 7.29 8.35 11.66a2.5 2.5 0 0 0 3.3 0C18.82 16.29 22 12.92 22 9c0-3.31-2.24-6-5-6a5.07 5.07 0 0 0-3.79 1.89l-.21.25-.21-.25A5.07 5.07 0 0 0 7 3z"/></svg></div>
    <div class="hdr-text"><h1>Medi<span>Scan</span></h1><small>Scanner GS1 médicaments</small></div>
    <div class="pill loading" id="pill"><span class="dot"></span><span id="ptxt">Init…</span></div>
  </div>
  <div class="camera">
    <video id="video" autoplay playsinline muted></video>
    <div class="ov">
      <div class="vig"></div>
      <div class="frame"><div class="frame-b"></div><div class="c tl"></div><div class="c tr"></div><div class="c bl"></div><div class="c br"></div><div class="sweep"></div></div>
      <div class="flash" id="flash"></div>
      <div class="hint">Visez le DataMatrix du médicament</div>
    </div>
  </div>
  <div class="controls">
    <button class="btn btn-r" id="btn-torch"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M15.5 8a3.5 3.5 0 0 0-7 0c0 2 1.5 3 2 4h3c.5-1 2-2 2-4z"/></svg></button>
    <button class="btn btn-main" id="btn-cap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><line x1="14" y1="14" x2="21" y2="14"/><line x1="14" y1="17.5" x2="21" y2="17.5"/><line x1="14" y1="21" x2="21" y2="21"/></svg></button>
    <label class="btn btn-r fw"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg><input type="file" accept="image/*" id="file-input"></label>
  </div>
  <canvas id="capture-canvas"></canvas>
</div>
<div class="res" id="res">
  <div class="res-head"><h2>Résultat</h2><button class="btn-x" id="btn-close">&times;</button></div>
  <div class="res-body" id="res-body"></div>
  <div class="res-foot"><button class="btn btn-gh" id="btn-copy">Copier</button><button class="btn btn-pr" id="btn-rescan">Nouveau scan</button></div>
</div>

<script>
window.onerror=function(){sp('err','Erreur')};
function sp(t,x){var p=document.getElementById('pill'),s=document.getElementById('ptxt');if(p)p.className='pill '+t;if(s)s.textContent=x}

(async function(){try{
if(document.readyState==='loading')await new Promise(function(r){document.addEventListener('DOMContentLoaded',r)});

var video=document.getElementById('video'),cv=document.getElementById('capture-canvas'),cx=cv.getContext('2d',{willReadFrequently:true}),
  resPanel=document.getElementById('res'),resBody=document.getElementById('res-body'),fl=document.getElementById('flash');
var stream=null,det=null,scanning=false,torchOn=false,lastRaw='',raf=null,nat=false,poly=false;

// Audio
var actx=null;
function beep(){try{if(!actx)actx=new(window.AudioContext||window.webkitAudioContext);[800,1060].forEach(function(f,i){var o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.value=f;g.gain.value=.11;g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+.13+i*.08);o.connect(g);g.connect(actx.destination);o.start(actx.currentTime+i*.08);o.stop(actx.currentTime+.13+i*.08)})}catch(e){}}
function fb(){beep();fl.classList.add('on');setTimeout(function(){fl.classList.remove('on')},130);try{navigator.vibrate&&navigator.vibrate([50,25,50])}catch(e){}}
function sl(ms){return new Promise(function(r){setTimeout(r,ms)})}

// ── Engine ──
sp('loading','Moteur…');
if('BarcodeDetector'in window){try{var sf=await BarcodeDetector.getSupportedFormats();if(sf.indexOf('data_matrix')>=0){det=new BarcodeDetector({formats:['data_matrix']});nat=true}}catch(e){}}
if(!nat){sp('loading','WASM…');
var urls=['https://cdn.jsdelivr.net/npm/barcode-detector@2/dist/es/pure.min.js','https://unpkg.com/barcode-detector@2/dist/es/pure.min.js','https://esm.sh/barcode-detector@2?bundle'];
for(var ci=0;ci<urls.length;ci++){if(poly)break;try{var m=await Promise.race([import(urls[ci]),new Promise(function(_,j){setTimeout(function(){j()},15000)})]);var D=m.BarcodeDetector||(m.default&&m.default.BarcodeDetector)||m.default;if(D&&typeof D==='function'){det=new D({formats:['data_matrix']});poly=true}}catch(e){}}}

// ── Camera ──
sp('loading','Caméra…');
try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}},audio:false});video.srcObject=stream;video.play().catch(function(){});var a=0;while(video.videoWidth===0&&a<60){await sl(100);a++}cv.width=video.videoWidth||1280;cv.height=video.videoHeight||720}catch(e){sp('err','Caméra ✗')}

if(det&&video.videoWidth>0){sp('ok',(nat?'Natif':'WASM')+' ✓');startScan()}else{sp('err',!det?'Décodeur ✗':'Vidéo ✗')}

// ── Events ──
document.getElementById('btn-torch').addEventListener('click',async function(){if(!stream)return;var t=stream.getVideoTracks()[0],c=t.getCapabilities?t.getCapabilities():{};if(!c.torch)return;torchOn=!torchOn;await t.applyConstraints({advanced:[{torch:torchOn}]});this.classList.toggle('active',torchOn)});
document.getElementById('btn-cap').addEventListener('click',manual);
document.getElementById('file-input').addEventListener('change',function(e){if(e.target.files&&e.target.files[0])decFile(e.target.files[0]);e.target.value=''});
document.getElementById('btn-close').addEventListener('click',closeR);
document.getElementById('btn-rescan').addEventListener('click',closeR);
document.getElementById('btn-copy').addEventListener('click',function(){navigator.clipboard.writeText(lastRaw).then(function(){var b=document.getElementById('btn-copy');b.textContent='Copié ✓';setTimeout(function(){b.textContent='Copier'},1500)})});

// ═══════════════════════════════════════
// SCAN LOOP
// ═══════════════════════════════════════
function startScan(){if(scanning||!det)return;scanning=true;var iv=poly?250:50,last=0;
function lp(ts){if(!scanning)return;if(ts-last<iv){raf=requestAnimationFrame(lp);return}last=ts;
try{if(video.videoWidth===0){raf=requestAnimationFrame(lp);return}cx.drawImage(video,0,0,cv.width,cv.height);
det.detect(cv).then(function(r){if(r&&r.length>0&&r[0].rawValue&&r[0].rawValue.length>5&&scanning){scanning=false;fb();onDec(r[0].rawValue)}}).catch(function(){})}catch(e){}
if(scanning)raf=requestAnimationFrame(lp)}raf=requestAnimationFrame(lp)}
function stopScan(){scanning=false;if(raf)cancelAnimationFrame(raf)}

async function manual(){if(video.videoWidth===0||!det)return;cx.drawImage(video,0,0,cv.width,cv.height);
var vs=[cv,enh(cv),crop(cv,.55),bin(cv)];
for(var i=0;i<vs.length;i++){try{var r=await det.detect(vs[i]);if(r&&r.length>0&&r[0].rawValue&&r[0].rawValue.length>5){fb();onDec(r[0].rawValue);return}}catch(e){}}
sp('err','Non détecté');setTimeout(function(){sp('ok',(nat?'Natif':'WASM')+' ✓')},2000)}

async function decFile(file){var img=new Image;img.onload=async function(){cv.width=img.naturalWidth;cv.height=img.naturalHeight;cx.drawImage(img,0,0);
var vs=[cv,enh(cv),bin(cv),crop(cv,.6)];
for(var i=0;i<vs.length;i++){try{var r=await det.detect(vs[i]);if(r&&r.length>0&&r[0].rawValue&&r[0].rawValue.length>5){fb();onDec(r[0].rawValue);return}}catch(e){}}
sp('err','Non trouvé');setTimeout(function(){sp('ok','Prêt')},2000)};img.src=URL.createObjectURL(file)}

function enh(s){var c=document.createElement('canvas');c.width=s.width;c.height=s.height;var x=c.getContext('2d');x.filter='contrast(2) grayscale(1) brightness(1.1)';x.drawImage(s,0,0);return c}
function crop(s,r){var sz=Math.min(s.width,s.height)*r,x=(s.width-sz)/2,y=(s.height-sz)/2;var c=document.createElement('canvas');c.width=sz;c.height=sz;c.getContext('2d').drawImage(s,x,y,sz,sz,0,0,sz,sz);return c}
function bin(s){var c=document.createElement('canvas');c.width=s.width;c.height=s.height;var x=c.getContext('2d',{willReadFrequently:true});x.filter='contrast(3) grayscale(1) brightness(1.2)';x.drawImage(s,0,0);x.filter='none';var id=x.getImageData(0,0,c.width,c.height),d=id.data;for(var i=0;i<d.length;i+=4){var g=d[i]*.3+d[i+1]*.59+d[i+2]*.11;d[i]=d[i+1]=d[i+2]=g>128?255:0;}x.putImageData(id,0,0);return c}

// ═══════════════════════════════════════
// DECODE + LOOKUP
// ═══════════════════════════════════════
async function onDec(raw){
  lastRaw=raw;stopScan();
  var gs1=parseGS1(raw);
  var medInfo=detectMedType(gs1);
  medInfo.lookupState='loading';
  render(raw,gs1,medInfo);
  resPanel.classList.add('open');
  if(medInfo.gtin||medInfo.cip13){
    var res=await lookupMed(medInfo);
    if(res){
      medInfo.name=res.nom;medInfo.form=res.forme;medInfo.sub=res.titulaire;
      if(res.especes)medInfo.especes=res.especes;
      if(res.amm)medInfo.amm=res.amm;
      if(res.fromAnmv&&medInfo.type!=='human'){
        medInfo.type='vet';medInfo.typeLabel='Médicament vétérinaire';medInfo.isVet=true;
      }
      if(medInfo.type==='unknown'&&(res.especes||res.amm)){
        medInfo.type='vet';medInfo.typeLabel='Médicament vétérinaire';medInfo.isVet=true;
      }
      medInfo.lookupState='found';
    }else{
      medInfo.lookupState='notfound';
    }
    render(raw,gs1,medInfo);
  }
}

function closeR(){resPanel.classList.remove('open');if(video.videoWidth>0){cv.width=video.videoWidth;cv.height=video.videoHeight}setTimeout(startScan,300)}

// ═══════════════════════════════════════
// MEDICATION TYPE DETECTION
// ═══════════════════════════════════════
function detectMedType(gs1){
  var info={type:'unknown',typeLabel:'Produit',cip13:null,gtin:null,isVet:false,name:null,form:null,sub:null};
  var gtinField=fd(gs1.fields,'01');
  if(!gtinField)return info;
  var code=gtinField.raw;
  var g13=code;
  if(code.length===14&&code[0]==='0')g13=code.substring(1);
  info.gtin=g13;

  // All French pharma CIP13 start with 340
  if(/^340[0-9]/.test(g13)){
    info.cip13=g13;
    if(g13.substring(0,5)==='34009'){info.type='human';info.typeLabel='Médicament humain';}
    else if(g13.substring(0,5)==='34008'){info.type='human';info.typeLabel='Médicament hospitalier';}
    else if(g13.substring(0,5)==='34007'){info.type='device';info.typeLabel='Dispositif médical';}
    else if(g13.substring(0,4)==='3401'){info.type='human';info.typeLabel='Produit de santé';}
    else{info.type='pharma';info.typeLabel='Produit pharmaceutique FR';}
  }
  // French veterinary — EAN company prefixes used by vet pharma labs
  else if(/^(366|367|368|369|376|350|325|3597|3660|5060|5014|8710|8714|4015|4260)/.test(g13)){
    info.type='vet';info.typeLabel='Médicament vétérinaire';info.isVet=true;
  }
  // NHRN AI present → human
  else{
    var nhrn=fd(gs1.fields,'711')||fd(gs1.fields,'710')||fd(gs1.fields,'712');
    if(nhrn){info.type='human';info.typeLabel='Médicament humain';info.cip13=nhrn.raw;}
    else{info.type='unknown';info.typeLabel='Produit GS1';}
  }
  return info;
}

// ═══════════════════════════════════════
// ANMV GTIN database for veterinary meds (loaded once)
var anmvDb=null,anmvLoading=null;
function loadAnmvDb(){
  if(anmvDb)return Promise.resolve(anmvDb);
  if(anmvLoading)return anmvLoading;
  anmvLoading=fetch('anmv_gtin.json').then(function(r){return r.json()}).then(function(d){anmvDb=d;return d}).catch(function(){anmvDb={};return{}});
  return anmvLoading;
}
// preload on page start
loadAnmvDb();

// MEDICATION NAME LOOKUP — tries all APIs
// ═══════════════════════════════════════
async function lookupMed(medInfo){
  var g14=medInfo.gtin;
  if(!g14)return null;
  // Ensure 14-digit GTIN for vet DB lookup
  if(g14.length===13)g14='0'+g14;
  var g13=g14.length===14&&g14[0]==='0'?g14.substring(1):g14;

  // ALWAYS check ANMV vet database first (covers all prefixes)
  var db=await loadAnmvDb();
  var entry=db[g14]||db[g13];
  if(entry)return{nom:entry.n,forme:entry.p||null,titulaire:entry.t||null,fromAnmv:true};

  // If explicitly vet but not in ANMV, no other source
  if(medInfo.isVet)return null;

  var promises=[];

  // 1. medicaments-api.giygas.dev ?cip= — BEST source for CIP13 (returns full med info)
  if(/^340/.test(g13)){
    promises.push(tryFetch('https://medicaments-api.giygas.dev/v1/medicaments?cip='+g13,function(data){
      if(!data)return null;
      if(data.elementPharmaceutique)return{nom:data.elementPharmaceutique,forme:data.formePharmaceutique||null,titulaire:data.titulaire||null};
      if(Array.isArray(data)&&data.length>0){var m=data[0];return{nom:m.elementPharmaceutique||m.denomination||null,forme:m.formePharmaceutique||null,titulaire:m.titulaire||null};}
      return null;
    }));
  }

  // 2. bdpmgf.vedielaute.fr — BDPM mirror (CORS OK, no auth)
  // global search (better than presentations endpoint which returns packaging names)
  promises.push(tryFetch('https://bdpmgf.vedielaute.fr/api/medicaments/search?q='+g13+'&limit=3',function(data){
    if(data&&data.data&&data.data.length>0){var s=data.data[0];
      var nom=s.denomination||s.elementPharmaceutique||null;
      if(!nom)return null;
      return{nom:nom,forme:s.formePharmaceutique||null,titulaire:s.titulaire||null};}
    return null;
  }));

  // 3. medicaments-api.giygas.dev ?search= fallback
  if(/^340/.test(g13)){
    promises.push(tryFetch('https://medicaments-api.giygas.dev/v1/medicaments?search='+g13,function(data){
      if(Array.isArray(data)&&data.length>0){var m=data[0];return{nom:m.elementPharmaceutique||m.denomination||null,forme:m.formePharmaceutique||null,titulaire:m.titulaire||null};}
      if(data&&data.data&&data.data.length>0){var m2=data.data[0];return{nom:m2.elementPharmaceutique||m2.denomination||null,forme:m2.formePharmaceutique||null,titulaire:m2.titulaire||null};}
      return null;
    }));
  }

  // 4. Open Food Facts (sometimes has OTC pharma)
  promises.push(tryFetch('https://world.openfoodfacts.org/api/v2/product/'+g13+'.json?fields=product_name,brands',function(data){
    if(data&&data.status===1&&data.product&&data.product.product_name){
      return{nom:data.product.product_name,forme:null,titulaire:data.product.brands||null};}return null;
  }));

  // 5. Open Beauty Facts (parapharmacy, cosmetics, OTC)
  promises.push(tryFetch('https://world.openbeautyfacts.org/api/v2/product/'+g13+'.json?fields=product_name,brands',function(data){
    if(data&&data.status===1&&data.product&&data.product.product_name){
      return{nom:data.product.product_name,forme:null,titulaire:data.product.brands||null};}return null;
  }));

  // 6. Open Pet Food Facts (pet products)
  promises.push(tryFetch('https://world.openpetfoodfacts.org/api/v2/product/'+g13+'.json?fields=product_name,brands',function(data){
    if(data&&data.status===1&&data.product&&data.product.product_name){
      return{nom:data.product.product_name,forme:null,titulaire:data.product.brands||null};}return null;
  }));

  var settled=await Promise.allSettled(promises);
  for(var i=0;i<settled.length;i++){
    if(settled[i].status==='fulfilled'&&settled[i].value&&settled[i].value.nom){
      return settled[i].value;
    }
  }
  return null;
}

function tryFetch(url,parser){
  return new Promise(function(resolve){
    var timeout=setTimeout(function(){resolve(null)},8000);
    fetch(url).then(function(r){
      if(!r.ok){clearTimeout(timeout);resolve(null);return}
      return r.json();
    }).then(function(data){
      clearTimeout(timeout);
      try{resolve(parser(data))}catch(e){resolve(null)}
    }).catch(function(){clearTimeout(timeout);resolve(null)});
  });
}

// ═══════════════════════════════════════
// GS1 PARSER
// ═══════════════════════════════════════
function parseGS1(raw){
  var res={fields:[],isGS1:false},data=raw;
  if(data.indexOf(']d2')===0||data.indexOf(']Q3')===0||data.indexOf(']C1')===0)data=data.substring(3);
  while(data.length>0&&(data.charCodeAt(0)<=0x1F||data.charCodeAt(0)===232))data=data.substring(1);
  data=data.replace(/\((\d{2,4})\)/g,'$1');
  if(/^01\d{14}/.test(data)||/^\d{2}/.test(data))res.isGS1=true;
  var pos=0,mx=50;
  while(pos<data.length&&mx-->0){
    if(data.charCodeAt(pos)<=0x1F){pos++;continue}
    var ok=false;
    for(var a=0;a<AIS.length;a++){
      var def=AIS[a],code=def[0];
      if(data.substring(pos,pos+code.length)!==code)continue;
      pos+=code.length;var v='';
      if(def[2]>0){v=data.substring(pos,pos+def[2]);pos+=def[2]}
      else{var e=data.length;for(var vi=pos;vi<data.length;vi++){if(data.charCodeAt(vi)<=0x1F){e=vi;break}}v=data.substring(pos,e);pos=e}
      res.fields.push({ai:code,label:def[1],value:fmtV(code,v),raw:v});ok=true;break}
    if(!ok){if(data.substring(pos).length>0)res.fields.push({ai:'??',label:'Données',value:data.substring(pos),raw:data.substring(pos)});break}
  }
  return res;
}

function fmtV(ai,v){if(('17'===ai||'11'===ai||'13'===ai||'15'===ai)&&v.length===6)return v.substring(4,6)+'/'+v.substring(2,4)+'/20'+v.substring(0,2);return v}
function expSt(fields){var f=null;for(var i=0;i<fields.length;i++){if(fields[i].ai==='17'){f=fields[i];break}}if(!f||f.raw.length!==6)return null;
var y=2000+parseInt(f.raw.substring(0,2),10),mo=parseInt(f.raw.substring(2,4),10)-1,d=parseInt(f.raw.substring(4,6),10)||28;
var exp=new Date(y,mo,d),diff=Math.ceil((exp-new Date)/864e5);
if(diff<0)return{t:'Expiré depuis '+Math.abs(diff)+' jours',c:'expired'};
if(diff<90)return{t:'Expire dans '+diff+' jours',c:'warn'};
return{t:'Valide — '+diff+' jours restants',c:'valid'}}

var AIS=[['00','SSCC',18],['01','GTIN',14],['02','GTIN contenu',14],['10','N° Lot',0],['11','Date production',6],['13','Date emballage',6],['15','DLC optimale',6],['17','Date expiration',6],['20','Variante',2],['21','N° Série',0],['22','Données sec.',0],['235','Extension TPX',0],['240','ID compl.',0],['241','N° Client',0],['250','Série sec.',0],['253','ID global',0],['30','Quantité',0],['3100','Poids (kg)',6],['3101','Poids (kg)',6],['3102','Poids (kg)',6],['3103','Poids (kg)',6],['310','Poids (kg)',6],['320','Poids (lb)',6],['37','Nb unités',0],['400','N° Commande',0],['410','GLN dest.',13],['411','GLN fact.',13],['414','GLN lieu',13],['415','GLN émetteur',13],['421','CP dest.',0],['422','Pays origine',3],['710','NHRN DE',0],['711','NHRN FR (CIP)',0],['712','NHRN ES',0],['713','NHRN BR',0],['714','NHRN PT',0],['7003','Exp. date/heure',10],['91','Info interne',0],['92','Info interne',0],['93','Info interne',0]];
AIS.sort(function(a,b){return b[0].length-a[0].length||a[0].localeCompare(b[0])});

// ═══════════════════════════════════════
// RENDER
// ═══════════════════════════════════════
function render(raw,gs1,med){
  var h='';
  if(gs1.isGS1&&gs1.fields.length>0){
    var gtin=fd(gs1.fields,'01'),lot=fd(gs1.fields,'10'),exp=fd(gs1.fields,'17'),sn=fd(gs1.fields,'21'),es=expSt(gs1.fields);

    // Hero
    h+='<div class="hero">';
    var bc=med.type==='human'?'human':med.type==='vet'?'vet':'unknown';
    var icons={human:'💊',vet:'🐾',device:'🩺',para:'🧴',pharma:'💉',unknown:'📦'};
    h+='<div class="type-badge '+bc+'">'+(icons[med.type]||'📦')+' '+esc(med.typeLabel)+'</div>';

    if(gtin)h+='<div class="gtin">GTIN '+esc(gtin.value)+'</div>';

    // Name
    if(med.name){
      h+='<div class="med-name">'+esc(med.name)+'</div>';
      if(med.form)h+='<div class="med-sub">'+esc(med.form)+'</div>';
      if(med.sub)h+='<div class="med-sub" style="font-size:.68rem;margin-bottom:4px">'+esc(med.sub)+'</div>';
      if(med.especes)h+='<div class="med-sub" style="font-size:.72rem;margin-bottom:4px">🐾 Espèces : <strong style="color:var(--text)">'+esc(med.especes)+'</strong></div>';
      if(med.amm)h+='<div class="med-sub" style="font-size:.66rem">AMM n° '+esc(med.amm)+'</div>';
    }else if(med.lookupState==='loading'){
      h+='<div class="med-loading">⏳ Recherche du nom…</div>';
    }else if(med.lookupState==='notfound'&&med.isVet){
      h+='<div class="med-sub" style="color:var(--text-dim)">Nom non trouvé dans la base ANMV</div>';
    }else if(med.lookupState==='notfound'){
      h+='<div class="med-sub" style="color:var(--text-dim)">Nom non trouvé dans les bases</div>';
    }else{
      h+='<div class="med-name">Produit scanné</div>';
    }

    // Meta chips
    h+='<div class="meta">';
    if(lot)h+='<div class="chip"><span>🏷</span><span><span class="lb">Lot </span><strong>'+esc(lot.value)+'</strong></span></div>';
    if(exp)h+='<div class="chip exp"><span>📅</span><span><span class="lb">Exp </span><strong>'+esc(exp.value)+'</strong></span></div>';
    if(sn)h+='<div class="chip"><span>🔢</span><span><span class="lb">SN </span><strong>'+esc(sn.value)+'</strong></span></div>';
    h+='</div>';

    if(es)h+='<div class="exp-bar '+es.c+'">'+(es.c==='valid'?'✅':es.c==='warn'?'⚠️':'❌')+' '+es.t+'</div>';
    h+='</div>';

    // Fields
    h+='<div class="stitle">Données GS1</div><div class="fields">';
    for(var i=0;i<gs1.fields.length;i++){var fi=gs1.fields[i];
      h+='<div class="fd"><div class="fd-l"><div class="fd-ai">('+esc(fi.ai)+')</div><div class="fd-lb">'+esc(fi.label)+'</div></div><div class="fd-v">'+esc(fi.value)+'</div></div>'}
    h+='</div>';

  }else{
    h+='<div class="hero"><div class="type-badge unknown">📦 DataMatrix</div>';
    h+='<div class="med-name" style="word-break:break-all">'+esc(raw)+'</div></div>';
  }

  h+='<div class="stitle">Brut</div><div class="raw"><div class="raw-lb">'+raw.length+' car.</div><pre>'+esc(fmtR(raw))+'</pre></div>';
  resBody.innerHTML=h;
}

function fd(f,ai){for(var i=0;i<f.length;i++){if(f[i].ai===ai)return f[i]}return null}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtR(s){return s.replace(/[\x00-\x1F]/g,function(c){var n=c.charCodeAt(0);return{29:'⟨GS⟩',30:'⟨RS⟩',31:'⟨US⟩'}[n]||'⟨'+n.toString(16).padStart(2,'0')+'⟩'})}

}catch(e){sp('err','Crash');console.error(e)}})();
if('serviceWorker'in navigator){navigator.serviceWorker.getRegistrations().then(function(rs){rs.forEach(function(r){r.unregister()});setTimeout(function(){navigator.serviceWorker.register('sw.js').catch(function(){})},500)})}
</script>
