<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <title>2D-Doc Scanner</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;400;600;700&display=swap');
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c28;--border:#2a2a3a;--text:#e8e8f0;--text-dim:#8888a0;--accent:#00e5a0;--accent-dim:#00e5a020;--danger:#ff4466;--warning:#ffaa00;--radius:16px}
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;overflow:hidden;-webkit-tap-highlight-color:transparent}
    .app{display:flex;flex-direction:column;height:100dvh;max-width:500px;margin:0 auto}

    /* Header */
    .header{padding:16px 20px;display:flex;align-items:center;gap:12px;z-index:10;background:var(--bg);border-bottom:1px solid var(--border)}
    .header-icon{width:36px;height:36px;background:var(--accent);border-radius:10px;display:grid;place-items:center;flex-shrink:0}
    .header-icon svg{width:20px;height:20px}
    .header h1{font-size:1.15rem;font-weight:700;letter-spacing:-0.02em}
    .header small{font-size:.7rem;color:var(--text-dim);font-weight:400}
    .status-pill{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:.65rem;padding:4px 10px;border-radius:20px;background:var(--surface2);color:var(--text-dim);font-family:'JetBrains Mono',monospace;white-space:nowrap;transition:all .3s}
    .status-pill .dot{width:7px;height:7px;border-radius:50%;transition:background .3s}
    .status-pill.ok .dot{background:var(--accent)}
    .status-pill.ok{color:var(--accent)}
    .status-pill.warn .dot{background:var(--warning)}
    .status-pill.warn{color:var(--warning)}
    .status-pill.err .dot{background:var(--danger)}
    .status-pill.err{color:var(--danger)}
    .status-pill.loading .dot{background:var(--warning);animation:blink 1s ease infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

    /* Camera */
    .camera-container{position:relative;flex:1;background:#000;overflow:hidden;display:flex;align-items:center;justify-content:center}
    #video{width:100%;height:100%;object-fit:cover}
    .scan-zone{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:220px;height:220px;pointer-events:none}
    .scan-zone::before{content:'';position:absolute;inset:-2px;border:2px solid var(--accent);border-radius:20px;opacity:.5}
    .scan-corner{position:absolute;width:28px;height:28px;border-color:var(--accent);border-style:solid;border-width:0}
    .scan-corner.tl{top:-2px;left:-2px;border-top-width:3px;border-left-width:3px;border-radius:12px 0 0 0}
    .scan-corner.tr{top:-2px;right:-2px;border-top-width:3px;border-right-width:3px;border-radius:0 12px 0 0}
    .scan-corner.bl{bottom:-2px;left:-2px;border-bottom-width:3px;border-left-width:3px;border-radius:0 0 0 12px}
    .scan-corner.br{bottom:-2px;right:-2px;border-bottom-width:3px;border-right-width:3px;border-radius:0 0 12px 0}
    .scan-line{position:absolute;top:0;left:10%;width:80%;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);border-radius:2px;animation:scanMove 2s ease-in-out infinite;box-shadow:0 0 12px var(--accent)}
    @keyframes scanMove{0%,100%{top:5%;opacity:.4}50%{top:92%;opacity:1}}
    .camera-overlay-mask{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 260px 260px at center,transparent 45%,rgba(0,0,0,.55) 70%)}

    /* Flash overlay on decode */
    .flash{position:absolute;inset:0;background:var(--accent);opacity:0;pointer-events:none;transition:opacity .1s}
    .flash.on{opacity:.25;transition:none}

    /* Bottom bar */
    .bottom-bar{position:absolute;bottom:0;left:0;right:0;padding:14px 20px;background:linear-gradient(transparent,rgba(0,0,0,.85));display:flex;align-items:center;justify-content:center;z-index:5}
    .format-pills{display:flex;gap:6px}
    .format-pill{font-family:'JetBrains Mono',monospace;font-size:.6rem;padding:3px 8px;border-radius:6px;background:rgba(255,255,255,.08);color:var(--text-dim)}
    .format-pill.active{background:var(--accent-dim);color:var(--accent)}

    /* Controls */
    .controls{padding:12px 20px;background:var(--bg);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:16px}
    .btn{border:none;cursor:pointer;font-family:inherit;border-radius:12px;font-weight:600;transition:all .15s;display:flex;align-items:center;gap:8px}
    .btn:active{transform:scale(.96)}
    .btn-primary{background:var(--accent);color:#0a0a0f;padding:14px 28px;font-size:.92rem}
    .btn-icon{width:48px;height:48px;background:var(--surface2);color:var(--text);display:grid;place-items:center;border-radius:50%}
    .btn-icon svg{width:20px;height:20px}
    .btn-icon.active{background:var(--accent-dim);color:var(--accent)}
    .btn-capture{width:64px;height:64px;background:var(--accent);border-radius:50%;display:grid;place-items:center;border:3px solid var(--bg);box-shadow:0 0 0 2px var(--accent)}
    .btn-capture svg{width:28px;height:28px;color:var(--bg)}
    .file-input-wrapper{position:relative;display:inline-block}
    .file-input-wrapper input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer}

    /* Results */
    .results-panel{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .35s cubic-bezier(.16,1,.3,1)}
    .results-panel.open{transform:translateY(0)}
    .results-header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
    .results-header h2{font-size:1.1rem;font-weight:700}
    .btn-close{width:36px;height:36px;background:var(--surface2);border:none;color:var(--text);border-radius:50%;display:grid;place-items:center;cursor:pointer;font-size:1.2rem}
    .results-body{flex:1;overflow-y:auto;padding:16px 20px;-webkit-overflow-scrolling:touch}

    .result-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;font-size:.75rem;font-weight:600;margin-bottom:12px}
    .result-badge.success{background:#00e5a018;color:var(--accent)}
    .result-badge.warning{background:#ffaa0018;color:var(--warning)}
    .result-badge.error{background:#ff446618;color:var(--danger)}

    .sig-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;font-size:.72rem;font-weight:600;margin-bottom:16px;margin-left:6px}
    .sig-badge.verified{background:#00e5a018;color:var(--accent)}
    .sig-badge.invalid{background:#ff446618;color:var(--danger)}
    .sig-badge.unknown{background:#ffaa0018;color:var(--warning)}

    .raw-data{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:20px}
    .raw-data-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim);margin-bottom:8px}
    .raw-data pre{font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--accent);white-space:pre-wrap;word-break:break-all;line-height:1.6}

    .fields-grid{display:flex;flex-direction:column;gap:8px}
    .field-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px}
    .field-tag{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--accent);font-weight:600;margin-bottom:2px}
    .field-label{font-size:.72rem;color:var(--text-dim);margin-bottom:4px}
    .field-value{font-size:.95rem;font-weight:600;color:var(--text);word-break:break-word}

    .results-actions{padding:16px 20px;border-top:1px solid var(--border);display:flex;gap:10px}
    .results-actions .btn{flex:1;justify-content:center}
    .btn-secondary{background:var(--surface2);color:var(--text);padding:14px 20px;font-size:.88rem}

    #capture-canvas{display:none}
    @supports(padding-top:env(safe-area-inset-top)){
      .header{padding-top:calc(16px + env(safe-area-inset-top))}
      .results-actions{padding-bottom:calc(16px + env(safe-area-inset-bottom))}
      .controls{padding-bottom:calc(12px + env(safe-area-inset-bottom))}
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0a0a0f" stroke-width="2.5" stroke-linecap="round">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
    </div>
    <div><h1>2D-Doc Scanner</h1><small>Lecture &amp; décodage documents sécurisés</small></div>
    <div class="status-pill loading" id="status-pill"><span class="dot"></span><span id="pill-text">Init…</span></div>
  </div>

  <div class="camera-container">
    <video id="video" autoplay playsinline muted></video>
    <div class="camera-overlay-mask"></div>
    <div class="scan-zone">
      <div class="scan-corner tl"></div><div class="scan-corner tr"></div>
      <div class="scan-corner bl"></div><div class="scan-corner br"></div>
      <div class="scan-line"></div>
    </div>
    <div class="flash" id="flash"></div>
    <div class="bottom-bar">
      <div class="format-pills" id="format-pills"></div>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-icon" id="btn-torch">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2v1"/>
        <path d="m4.9 4.9.7.7"/><path d="M2 12h1"/><path d="m19.1 4.9-.7.7"/><path d="M22 12h-1"/>
        <path d="M15.5 8a3.5 3.5 0 0 0-7 0c0 2 1.5 3 2 4h3c.5-1 2-2 2-4z"/>
      </svg>
    </button>
    <button class="btn btn-capture" id="btn-capture">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="13" r="4"/>
        <path d="M9 2 7.2 4H4a1 1 0 0 0-1 1v14a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1V5a1 1 0 0 0-1-1h-3.2L15 2z"/>
      </svg>
    </button>
    <label class="btn btn-icon file-input-wrapper">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <input type="file" accept="image/*" id="file-input">
    </label>
  </div>
  <canvas id="capture-canvas"></canvas>
</div>

<div class="results-panel" id="results-panel">
  <div class="results-header"><h2>Résultat</h2><button class="btn-close" id="btn-close-results">&times;</button></div>
  <div class="results-body" id="results-body"></div>
  <div class="results-actions">
    <button class="btn btn-secondary" id="btn-copy">Copier</button>
    <button class="btn btn-primary" id="btn-rescan">Nouveau scan</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// Global error safety net
// ═══════════════════════════════════════
window.onerror = function(m) { setPill('err', 'Erreur'); console.error(m); };
window.addEventListener('unhandledrejection', function(e) { console.error(e.reason); });

function setPill(type, text) {
  var p = document.getElementById('status-pill');
  var t = document.getElementById('pill-text');
  if (p) { p.className = 'status-pill ' + type; }
  if (t) { t.textContent = text; }
}

// ═══════════════════════════════════════
// MAIN
// ═══════════════════════════════════════
(async function() {
  try {
  if (document.readyState === 'loading')
    await new Promise(function(r) { document.addEventListener('DOMContentLoaded', r); });

  var video = document.getElementById('video');
  var captureCanvas = document.getElementById('capture-canvas');
  var captureCtx = captureCanvas.getContext('2d', { willReadFrequently: true });
  var resultsPanel = document.getElementById('results-panel');
  var resultsBody = document.getElementById('results-body');
  var flash = document.getElementById('flash');
  var formatPillsEl = document.getElementById('format-pills');

  var stream = null, detector = null, scanning = false, torchOn = false, lastRaw = '', scanRafId = null;
  var FORMATS = ['data_matrix', 'qr_code', 'pdf417', 'aztec', 'code_128', 'code_39', 'code_93', 'codabar', 'ean_13', 'ean_8', 'upc_a', 'upc_e', 'itf'];
  var activeFormats = [];

  // ─── Audio feedback ───
  var audioCtx = null;
  function beepSuccess() {
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      // Two-tone success beep
      [860, 1080].forEach(function(freq, i) {
        var osc = audioCtx.createOscillator();
        var gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.value = 0.15;
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15 + i * 0.1);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(audioCtx.currentTime + i * 0.1);
        osc.stop(audioCtx.currentTime + 0.15 + i * 0.1);
      });
    } catch(e) {}
  }

  function flashScreen() {
    flash.classList.add('on');
    setTimeout(function() { flash.classList.remove('on'); }, 150);
  }

  function vibrate() { try { navigator.vibrate && navigator.vibrate([80, 40, 80]); } catch(e) {} }

  function feedback() { beepSuccess(); flashScreen(); vibrate(); }

  // ─── STEP 1: Detect engine ───
  setPill('loading', 'Moteur…');

  var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  var useNative = false, usePolyfill = false;

  // Try native BarcodeDetector
  if ('BarcodeDetector' in window) {
    try {
      var supported = await BarcodeDetector.getSupportedFormats();
      var available = FORMATS.filter(function(f) { return supported.indexOf(f) >= 0; });
      if (available.length > 0) {
        detector = new BarcodeDetector({ formats: available });
        activeFormats = available;
        useNative = true;
      }
    } catch(e) {}
  }

  // Polyfill for iOS
  if (!useNative) {
    setPill('loading', 'WASM…');
    var cdns = [
      'https://cdn.jsdelivr.net/npm/barcode-detector@2/dist/es/pure.min.js',
      'https://unpkg.com/barcode-detector@2/dist/es/pure.min.js',
      'https://esm.sh/barcode-detector@2?bundle'
    ];

    for (var ci = 0; ci < cdns.length; ci++) {
      if (usePolyfill) break;
      try {
        var mod = await Promise.race([
          import(cdns[ci]),
          new Promise(function(_, rej) { setTimeout(function() { rej(new Error('timeout')); }, 15000); })
        ]);
        var Det = mod.BarcodeDetector || (mod.default && mod.default.BarcodeDetector) || mod.default;
        if (Det && typeof Det === 'function') {
          var polyfillFormats = [];
          if (Det.getSupportedFormats) {
            var pf = await Det.getSupportedFormats();
            polyfillFormats = FORMATS.filter(function(f) { return pf.indexOf(f) >= 0; });
          }
          if (polyfillFormats.length === 0) polyfillFormats = ['data_matrix', 'qr_code'];
          detector = new Det({ formats: polyfillFormats });
          activeFormats = polyfillFormats;
          usePolyfill = true;
        }
      } catch(e) {}
    }
  }

  // Show format pills
  activeFormats.forEach(function(f) {
    var pill = document.createElement('span');
    pill.className = 'format-pill active';
    pill.textContent = f.replace('_', ' ').toUpperCase();
    formatPillsEl.appendChild(pill);
  });

  if (!useNative && !usePolyfill) {
    setPill('warn', 'Manuel');
  }

  // ─── STEP 2: Camera ───
  setPill('loading', 'Caméra…');
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    video.srcObject = stream;
    video.play().catch(function() {});

    var att = 0;
    while (video.videoWidth === 0 && att < 60) { await sleep(100); att++; }
    captureCanvas.width = video.videoWidth || 1280;
    captureCanvas.height = video.videoHeight || 720;
  } catch(e) {
    setPill('err', 'Caméra ✗');
  }

  // ─── STEP 3: Go ───
  if (detector && video.videoWidth > 0) {
    setPill('ok', (useNative ? 'Natif' : 'WASM') + ' — ' + activeFormats.length + ' formats');
    startScanning();
  } else if (video.videoWidth > 0) {
    setPill('warn', 'Capture seule');
  } else {
    setPill('err', 'Init échoué');
  }

  setupEvents();

  // ═══════════════════════════════════════
  // SCANNING
  // ═══════════════════════════════════════
  function startScanning() {
    if (scanning || !detector) return;
    scanning = true;
    var interval = usePolyfill ? 250 : 40;
    var lastScan = 0;

    function loop(ts) {
      if (!scanning) return;
      if (ts - lastScan < interval) { scanRafId = requestAnimationFrame(loop); return; }
      lastScan = ts;
      try {
        if (video.videoWidth === 0) { scanRafId = requestAnimationFrame(loop); return; }
        captureCtx.drawImage(video, 0, 0, captureCanvas.width, captureCanvas.height);

        detector.detect(captureCanvas).then(function(r) {
          if (r && r.length > 0 && r[0].rawValue && r[0].rawValue.length > 5 && scanning) {
            scanning = false;
            feedback();
            handleResult(r[0].rawValue, r[0].format || 'unknown', r[0]);
          }
        }).catch(function() {});
      } catch(e) {}
      if (scanning) scanRafId = requestAnimationFrame(loop);
    }
    scanRafId = requestAnimationFrame(loop);
  }

  function stopScanning() { scanning = false; if (scanRafId) cancelAnimationFrame(scanRafId); }

  async function manualCapture() {
    if (video.videoWidth === 0) return;
    captureCtx.drawImage(video, 0, 0, captureCanvas.width, captureCanvas.height);
    if (!detector) return;

    var variants = [captureCanvas, enhance(captureCanvas), cropCenter(captureCanvas, 0.55), binarize(captureCanvas), binarize(cropCenter(captureCanvas, 0.55))];
    for (var i = 0; i < variants.length; i++) {
      try {
        var r = await detector.detect(variants[i]);
        if (r && r.length > 0 && r[0].rawValue && r[0].rawValue.length > 5) {
          feedback();
          handleResult(r[0].rawValue, r[0].format || 'unknown', r[0]);
          return;
        }
      } catch(e) {}
    }
    // Quick flash red
    setPill('warn', 'Non détecté');
    setTimeout(function() { setPill('ok', (useNative ? 'Natif' : 'WASM') + ' — ' + activeFormats.length + ' formats'); }, 2000);
  }

  async function decodeFromFile(file) {
    var img = new Image();
    img.onload = async function() {
      captureCanvas.width = img.naturalWidth;
      captureCanvas.height = img.naturalHeight;
      captureCtx.drawImage(img, 0, 0);
      if (!detector) return;
      var variants = [captureCanvas, enhance(captureCanvas), binarize(captureCanvas), cropCenter(captureCanvas, 0.6), binarize(cropCenter(captureCanvas, 0.6))];
      for (var i = 0; i < variants.length; i++) {
        try {
          var r = await detector.detect(variants[i]);
          if (r && r.length > 0 && r[0].rawValue && r[0].rawValue.length > 5) {
            feedback();
            handleResult(r[0].rawValue, r[0].format || 'unknown', r[0]);
            return;
          }
        } catch(e) {}
      }
      setPill('warn', 'Non trouvé');
      setTimeout(function() { setPill('ok', 'Prêt'); }, 2000);
    };
    img.src = URL.createObjectURL(file);
  }

  // Image processing
  function enhance(src) {
    var c = document.createElement('canvas'); c.width = src.width; c.height = src.height;
    var ctx = c.getContext('2d'); ctx.filter = 'contrast(2) grayscale(1) brightness(1.1)'; ctx.drawImage(src, 0, 0); return c;
  }
  function cropCenter(src, ratio) {
    var size = Math.min(src.width, src.height) * ratio;
    var x = (src.width - size) / 2, y = (src.height - size) / 2;
    var c = document.createElement('canvas'); c.width = size; c.height = size;
    c.getContext('2d').drawImage(src, x, y, size, size, 0, 0, size, size); return c;
  }
  function binarize(src) {
    var c = document.createElement('canvas'); c.width = src.width; c.height = src.height;
    var ctx = c.getContext('2d', { willReadFrequently: true });
    ctx.filter = 'contrast(3) grayscale(1) brightness(1.2)'; ctx.drawImage(src, 0, 0); ctx.filter = 'none';
    var id = ctx.getImageData(0, 0, c.width, c.height), d = id.data;
    for (var i = 0; i < d.length; i += 4) { var g = d[i]*.299+d[i+1]*.587+d[i+2]*.114; d[i]=d[i+1]=d[i+2]= g>128?255:0; }
    ctx.putImageData(id, 0, 0); return c;
  }
  function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

  // ═══════════════════════════════════════
  // RESULT HANDLING
  // ═══════════════════════════════════════
  async function handleResult(raw, format, detectedBarcode) {
    lastRaw = raw;
    stopScanning();

    var rawBytes = null;
    if (detectedBarcode) {
      if (detectedBarcode.rawBytes) rawBytes = detectedBarcode.rawBytes;
      else if (detectedBarcode.rawData) rawBytes = new Uint8Array(detectedBarcode.rawData);
    }

    // Smart detection: GS1 DataMatrix, 2D-Doc, or plain barcode
    var result = { type: 'plain', raw: raw, format: format };

    if (isGS1(raw)) {
      result = { type: 'gs1', data: parseGS1(raw), raw: raw, format: format };
    } else {
      var parsed = parse2DDoc(raw, rawBytes);
      if (parsed.isValid && parsed.fields.length > 0) {
        var sigResult = null;
        if (parsed.signature && parsed.messageToVerify) {
          sigResult = await verifySignature(parsed);
        }
        result = { type: '2ddoc', data: parsed, sig: sigResult, raw: raw, format: format };
      }
    }

    renderResults(result);
    resultsPanel.classList.add('open');
  }

  // ═══════════════════════════════════════
  // GS1 DATAMATRIX PARSER
  // ═══════════════════════════════════════
  function isGS1(raw) {
    // GS1 DataMatrix starts with ]d2 or FNC1 (0xE8/232) or GS (0x1D/29)
    if (raw.indexOf(']d2') === 0 || raw.indexOf(']Q3') === 0 || raw.indexOf(']C1') === 0) return true;
    var c0 = raw.charCodeAt(0);
    if (c0 === 232 || c0 === 0x1D || c0 === 0x1E || c0 === 0x1F) {
      // Check if after the control char it looks like GS1
      var after = raw.substring(1);
      if (/^01\d{14}/.test(after)) return true;
      if (/^\d{2}/.test(after)) return true; // Starts with any AI
    }
    // Direct AI patterns
    if (/^01\d{14}/.test(raw)) return true;
    if (/^\(01\)/.test(raw)) return true;
    return false;
  }

  function parseGS1(raw) {
    var res = { fields: [], diag: {} };
    var data = raw;

    // Strip symbology identifier
    if (data.indexOf(']d2') === 0 || data.indexOf(']Q3') === 0 || data.indexOf(']C1') === 0) {
      data = data.substring(3);
    }
    // Strip leading FNC1 or GS or control chars
    while (data.length > 0 && (data.charCodeAt(0) <= 0x1F || data.charCodeAt(0) === 232)) {
      data = data.substring(1);
    }

    // Strip parentheses format: (01)12345 → 0112345
    data = data.replace(/\((\d{2,4})\)/g, '$1');

    res.diag.cleaned = data.substring(0, 40) + '…';

    var pos = 0;
    var maxIter = 50;

    while (pos < data.length && maxIter-- > 0) {
      // Skip GS separators
      if (data.charCodeAt(pos) === 0x1D || data.charCodeAt(pos) <= 0x1F) { pos++; continue; }

      var matched = false;

      // Try each known AI
      for (var ai = 0; ai < GS1_AIS.length; ai++) {
        var def = GS1_AIS[ai];
        var code = def[0];
        if (data.substring(pos, pos + code.length) !== code) continue;

        pos += code.length;
        var val = '';

        if (def[2] > 0) {
          // Fixed length
          val = data.substring(pos, pos + def[2]);
          pos += def[2];
        } else {
          // Variable length — read until GS (0x1D) or end
          var end = data.length;
          for (var vi = pos; vi < data.length; vi++) {
            if (data.charCodeAt(vi) === 0x1D || data.charCodeAt(vi) <= 0x1F) { end = vi; break; }
          }
          val = data.substring(pos, end);
          pos = end;
        }

        res.fields.push({ ai: code, label: def[1], value: formatGS1Value(code, val), rawValue: val });
        matched = true;
        break;
      }

      if (!matched) {
        // Unknown AI, try to skip gracefully
        // Collect remaining as unknown
        var remainder = data.substring(pos);
        if (remainder.length > 0) {
          res.fields.push({ ai: '??', label: 'Données non parsées', value: remainder, rawValue: remainder });
        }
        break;
      }
    }

    return res;
  }

  function formatGS1Value(ai, val) {
    // Format expiry date YYMMDD
    if (ai === '17' && val.length === 6) {
      return val.substring(4, 6) + '/' + val.substring(2, 4) + '/20' + val.substring(0, 2);
    }
    // Format production date
    if (ai === '11' && val.length === 6) {
      return val.substring(4, 6) + '/' + val.substring(2, 4) + '/20' + val.substring(0, 2);
    }
    // Format weight (last digit = decimal places)
    if (/^31[0-9]{2}$/.test(ai)) {
      var dec = parseInt(ai[3], 10);
      var num = parseInt(val, 10);
      return (num / Math.pow(10, dec)).toFixed(dec) + ' kg';
    }
    return val;
  }

  // GS1 Application Identifiers: [code, label, fixedLength (0=variable)]

  // ═══════════════════════════════════════
  // 2D-DOC PARSER (ANTS spec) — robust
  // ═══════════════════════════════════════
  function parse2DDoc(raw, rawBytes) {
    var res = { isValid: false, header: {}, fields: [], signature: null, messageToVerify: null, raw: raw, diag: {} };

    // If we have rawBytes, try to use them for better control char preservation
    var workStr = raw;
    if (rawBytes && rawBytes.length > 0) {
      // Decode as ISO-8859-1 to preserve all byte values including control chars
      try {
        workStr = new TextDecoder('iso-8859-1').decode(rawBytes);
        res.diag.source = 'rawBytes (ISO-8859-1)';
      } catch(e) {
        res.diag.source = 'rawValue (fallback)';
      }
    } else {
      res.diag.source = 'rawValue';
    }

    // Diagnostic: count control chars
    var ctrlCount = 0;
    for (var ci = 0; ci < workStr.length; ci++) {
      var cc = workStr.charCodeAt(ci);
      if (cc === 0x1D || cc === 0x1E || cc === 0x1F) ctrlCount++;
    }
    res.diag.controlChars = ctrlCount;
    res.diag.length = workStr.length;

    try {
      var pos = 0;

      // ── Find DC marker ──
      var hStart = -1;
      for (var i = 0; i < Math.min(10, workStr.length - 1); i++) {
        if (workStr[i] === 'D' && workStr[i+1] === 'C') { hStart = i; break; }
      }

      if (hStart >= 0) {
        pos = hStart + 2;
        res.header.marker = 'DC';
        res.isValid = true;
      } else if (/^0[1-4]/.test(workStr)) {
        // Version without DC prefix (some old encoders)
        res.isValid = true;
      }

      if (!res.isValid) {
        // Not a 2D-Doc, return minimal parse
        return res;
      }

      // ── Parse header ──
      res.header.version = workStr.substring(pos, pos + 2); pos += 2;
      var ver = parseInt(res.header.version, 10);
      res.diag.version = ver;

      if (ver >= 1 && ver <= 4) {
        res.header.caId = workStr.substring(pos, pos + 4); pos += 4;
        res.header.certId = workStr.substring(pos, pos + 4); pos += 4;
        res.header.emissionDate = hexDate(workStr.substring(pos, pos + 4)); pos += 4;
        res.header.signatureDate = hexDate(workStr.substring(pos, pos + 4)); pos += 4;
        res.header.docTypeId = workStr.substring(pos, pos + 2); pos += 2;

        // v3/v4 have additional perimeter ID
        if (ver >= 3) {
          res.header.perimeterId = workStr.substring(pos, pos + 2); pos += 2;
        }
      }

      var rest = workStr.substring(pos);

      // ── Find signature ──
      // Signature is after the LAST GS (0x1D) or RS (0x1E) separator
      // and should be >= 64 chars for ECDSA P-256
      var sigIdx = -1;
      for (var j = rest.length - 1; j >= 0; j--) {
        var ch = rest.charCodeAt(j);
        if (ch === 0x1E || ch === 0x1D || ch === 0x1F) {
          var remaining = rest.length - j - 1;
          if (remaining >= 40) { sigIdx = j; break; }
        }
      }

      // Also try to find signature by looking for long hex-only suffix (no separators case)
      if (sigIdx < 0) {
        var hexMatch = rest.match(/([0-9A-Fa-f]{64,})$/);
        if (hexMatch) {
          sigIdx = rest.length - hexMatch[1].length - 1;
          res.diag.sigDetection = 'hex-suffix';
        }
      }

      var msg = sigIdx >= 0 ? rest.substring(0, sigIdx) : rest;
      if (sigIdx >= 0) {
        var sepChar = rest.charCodeAt(sigIdx);
        res.signature = rest.substring(sigIdx + (sepChar <= 0x1F ? 1 : 0));
        res.messageToVerify = workStr.substring(0, pos + sigIdx);
        res.diag.sigLength = res.signature.length;
      }

      // ── Parse fields ──
      if (ctrlCount > 0) {
        // Normal parsing with control characters
        var parts = msg.split(/[\x1D\x1E\x1F]/);
        for (var k = 0; k < parts.length; k++) {
          var p = parts[k];
          if (p.length < 3) continue;
          var tag = p.substring(0, 2).toUpperCase();
          var val = p.substring(2);
          res.fields.push({ tag: tag, label: TAGS[tag] ? TAGS[tag].label : 'Champ ' + tag, value: val });
        }
        res.diag.parseMethod = 'control-chars (' + ctrlCount + ' sép.)';
      } else {
        // No control chars — try tag-by-tag scanning
        res.diag.parseMethod = 'tag-scanning (pas de sép.)';
        parseFieldsByTags(msg, res.fields);
      }

    } catch(e) {
      res.parseError = e.message;
    }
    return res;
  }

  // Parse fields when control characters are missing
  // Uses known tag patterns and field length conventions
  function parseFieldsByTags(msg, fields) {
    if (!msg || msg.length < 3) return;

    // Known field length patterns per doc type
    // For variable-length fields, we scan until next known tag
    var allTags = Object.keys(TAGS);
    var pos = 0;
    var maxIter = 100; // safety

    while (pos < msg.length - 2 && maxIter-- > 0) {
      var tag = msg.substring(pos, pos + 2).toUpperCase();

      // Check if this looks like a valid tag
      if (TAGS[tag]) {
        pos += 2;
        // Find the end: look for the next valid tag
        var end = msg.length;
        for (var scan = pos + 1; scan < msg.length - 1; scan++) {
          var nextTag = msg.substring(scan, scan + 2).toUpperCase();
          if (TAGS[nextTag]) {
            end = scan;
            break;
          }
          // Also stop at control chars just in case
          if (msg.charCodeAt(scan) <= 0x1F) {
            end = scan;
            break;
          }
        }
        var val = msg.substring(pos, end);
        if (val.length > 0) {
          fields.push({ tag: tag, label: TAGS[tag].label, value: val });
        }
        pos = end;
      } else {
        // Unknown tag, try advancing one char
        pos++;
      }
    }

    // If no fields found with tag scanning, show the whole message as a single field
    if (fields.length === 0 && msg.length > 0) {
      fields.push({ tag: '??', label: 'Données brutes (non parsées)', value: msg });
    }
  }

  function hexDate(hex) {
    var d = parseInt(hex, 16);
    if (isNaN(d) || d > 36500) return hex;
    return new Date(2000, 0, 1 + d).toLocaleDateString('fr-FR');
  }

  // ═══════════════════════════════════════
  // SIGNATURE VERIFICATION (ECDSA P-256)
  // ═══════════════════════════════════════
  // Known ANTS CA public keys (source: https://ants.gouv.fr/2D-Doc)
  var KNOWN_KEYS = {
    // Format: "caId+certId" -> { x, y } (Base64url-encoded P-256 coordinates)
    // FR00 - ANTS production keys
    'FR000001': {
      x: 'f0yGRT4rOaIxjBN08mEUfb4Kry1rS6VBnxRoNJfl0Xo',
      y: 'b9Y_2nU-mSIyrNV1JhSAMQNMDfnJb9XWYn4aqw1p3kI',
      curve: 'P-256'
    },
    // Additional keys can be added as they are published
  };

  async function verifySignature(parsed) {
    // Check if Web Crypto is available
    if (!window.crypto || !window.crypto.subtle) {
      return { status: 'unsupported', message: 'Web Crypto non disponible' };
    }

    var caId = parsed.header.caId || '';
    var certId = parsed.header.certId || '';
    var keyId = caId + certId;

    // Check if we have the public key
    var keyData = KNOWN_KEYS[keyId];
    if (!keyData) {
      return { status: 'unknown', message: 'Clé CA inconnue: ' + keyId };
    }

    try {
      // Import the public key
      var publicKey = await crypto.subtle.importKey(
        'jwk',
        {
          kty: 'EC',
          crv: keyData.curve || 'P-256',
          x: keyData.x,
          y: keyData.y
        },
        { name: 'ECDSA', namedCurve: keyData.curve || 'P-256' },
        false,
        ['verify']
      );

      // Prepare the message (UTF-8 encoded)
      var msgBytes = new TextEncoder().encode(parsed.messageToVerify);

      // Decode signature from hex or raw
      var sigBytes;
      var sigStr = parsed.signature;
      if (/^[0-9a-fA-F]+$/.test(sigStr)) {
        // Hex-encoded signature
        sigBytes = hexToBytes(sigStr);
      } else {
        // Raw binary signature
        sigBytes = new Uint8Array(sigStr.length);
        for (var i = 0; i < sigStr.length; i++) {
          sigBytes[i] = sigStr.charCodeAt(i);
        }
      }

      // 2D-Doc uses DER-encoded ECDSA signatures — convert to raw r||s for Web Crypto
      var rawSig = derToRaw(sigBytes);
      if (!rawSig) {
        return { status: 'invalid', message: 'Format signature invalide (DER)' };
      }

      // Verify
      var valid = await crypto.subtle.verify(
        { name: 'ECDSA', hash: 'SHA-256' },
        publicKey,
        rawSig,
        msgBytes
      );

      return {
        status: valid ? 'verified' : 'invalid',
        message: valid ? 'Signature ECDSA valide ✓' : 'Signature invalide ✗',
        keyId: keyId
      };
    } catch(e) {
      return { status: 'error', message: 'Erreur vérif: ' + e.message };
    }
  }

  function hexToBytes(hex) {
    var bytes = new Uint8Array(hex.length / 2);
    for (var i = 0; i < hex.length; i += 2) {
      bytes[i / 2] = parseInt(hex.substring(i, i + 2), 16);
    }
    return bytes;
  }

  // Convert DER-encoded ECDSA signature to raw r||s (64 bytes for P-256)
  function derToRaw(der) {
    try {
      if (!(der instanceof Uint8Array)) return null;
      // Already raw 64-byte format?
      if (der.length === 64) return der;

      var offset = 0;
      if (der[offset] !== 0x30) return null; // SEQUENCE
      offset++;
      var seqLen = der[offset]; offset++;
      if (seqLen & 0x80) { offset += (seqLen & 0x7F); } // skip long form length

      // Read r
      if (der[offset] !== 0x02) return null; // INTEGER
      offset++;
      var rLen = der[offset]; offset++;
      var r = der.slice(offset, offset + rLen);
      offset += rLen;

      // Read s
      if (der[offset] !== 0x02) return null;
      offset++;
      var sLen = der[offset]; offset++;
      var s = der.slice(offset, offset + sLen);

      // Pad/trim to 32 bytes each
      var rPad = padTo32(r);
      var sPad = padTo32(s);

      var raw = new Uint8Array(64);
      raw.set(rPad, 0);
      raw.set(sPad, 32);
      return raw;
    } catch(e) {
      return null;
    }
  }

  function padTo32(buf) {
    // Remove leading zeros
    var start = 0;
    while (start < buf.length && buf[start] === 0) start++;
    var trimmed = buf.slice(start);
    if (trimmed.length > 32) trimmed = trimmed.slice(trimmed.length - 32);
    if (trimmed.length === 32) return trimmed;
    var padded = new Uint8Array(32);
    padded.set(trimmed, 32 - trimmed.length);
    return padded;
  }

          var ff = p.fields[j];
          var v = ff.value;
          if (/montant|net|impôt|revenu/i.test(ff.label)) {
            var n = parseInt(v, 10);
            if (!isNaN(n) && n > 0) v = (n / 100).toLocaleString('fr-FR', { style: 'currency', currency: 'EUR' });
          }
          if (/date/i.test(ff.label) && /^\d{8}$/.test(v)) {
            v = v.substring(0, 2) + '/' + v.substring(2, 4) + '/' + v.substring(4);
          }
          h += '<div class="field-card"><div class="field-tag">' + esc(ff.tag) + '</div>';
          h += '<div class="field-label">' + esc(ff.label) + '</div>';
          h += '<div class="field-value">' + esc(v) + '</div></div>';
        }
        h += '</div>';
      }

      if (p.signature) {
        h += '<div class="raw-data" style="margin-top:16px"><div class="raw-data-label">Signature (' + p.signature.length + ' car.)</div>';
        h += '<pre style="color:var(--warning)">' + esc(p.signature.substring(0, 120));
        if (p.signature.length > 120) h += '…';
        h += '</pre></div>';
      }

      // Diagnostic
      if (p.diag) {
        h += '<details style="margin-top:16px"><summary style="font-size:.7rem;color:var(--text-dim);cursor:pointer">Diagnostic technique</summary>';
        h += '<div class="raw-data" style="margin-top:8px"><pre style="color:var(--text-dim);font-size:.7rem">';
        h += 'Source: ' + (p.diag.source || '?') + '\n';
        h += 'Séparateurs: ' + (p.diag.controlChars || 0) + '\n';
        h += 'Parsing: ' + (p.diag.parseMethod || '?') + '\n';
        h += 'Champs: ' + p.fields.length + '\n';
        h += '\nHex (30 premiers):\n';
        for (var hi = 0; hi < Math.min(30, raw.length); hi++) {
          h += raw.charCodeAt(hi).toString(16).padStart(2, '0') + ' ';
          if ((hi + 1) % 16 === 0) h += '\n';
        }
        h += '</pre></div></details>';
      }

    } else {
      // ── Plain barcode ──
      h += '<div class="result-badge warning">' + fmtLabel + '</div>';
      h += '<div class="field-card" style="margin-top:12px">';
      h += '<div class="field-tag">' + fmtLabel + '</div>';
      h += '<div class="field-label">Valeur décodée</div>';
      h += '<div class="field-value" style="font-size:1.2rem;letter-spacing:.02em">' + esc(raw) + '</div>';
      h += '</div>';

      // For EAN/UPC, show product lookup hint
      if (/^(ean|upc)/i.test(format)) {
        h += '<div style="margin-top:12px;font-size:.78rem;color:var(--text-dim)">Astuce : recherchez ce code sur Open Food Facts ou un moteur de recherche pour identifier le produit.</div>';
      }
    }

    // Raw data (always shown)
    h += '<div class="raw-data" style="margin-top:20px">';
    h += '<div class="raw-data-label">Données brutes — ' + raw.length + ' car.</div>';
    h += '<pre>' + esc(fmtRaw(raw)) + '</pre></div>';

    resultsBody.innerHTML = h;
  }

  function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
  function fmtRaw(s) {
    return s.replace(/[\x00-\x1F]/g, function(c) {
      var n = c.charCodeAt(0);
      var names = { 0x1D: '⟨GS⟩', 0x1E: '⟨RS⟩', 0x1F: '⟨US⟩', 0x04: '⟨EOT⟩' };
      return names[n] || '⟨' + n.toString(16).padStart(2, '0') + '⟩';
    });
  }

  // ═══════════════════════════════════════
  // UI
  // ═══════════════════════════════════════
  function setupEvents() {
    document.getElementById('btn-torch').addEventListener('click', async function() {
      if (!stream) return;
      var track = stream.getVideoTracks()[0];
      var caps = track.getCapabilities ? track.getCapabilities() : {};
      if (!caps.torch) return;
      torchOn = !torchOn;
      await track.applyConstraints({ advanced: [{ torch: torchOn }] });
      this.classList.toggle('active', torchOn);
    });

    document.getElementById('btn-capture').addEventListener('click', manualCapture);

    document.getElementById('file-input').addEventListener('change', function(e) {
      if (e.target.files && e.target.files[0]) decodeFromFile(e.target.files[0]);
      e.target.value = '';
    });

    document.getElementById('btn-close-results').addEventListener('click', closeResults);
    document.getElementById('btn-rescan').addEventListener('click', closeResults);

    document.getElementById('btn-copy').addEventListener('click', function() {
      navigator.clipboard.writeText(lastRaw).then(function() {
        var btn = document.getElementById('btn-copy');
        btn.textContent = 'Copié ✓';
        setTimeout(function() { btn.textContent = 'Copier'; }, 1500);
      });
    });
  }

  function closeResults() {
    resultsPanel.classList.remove('open');
    if (video.videoWidth > 0) {
      captureCanvas.width = video.videoWidth;
      captureCanvas.height = video.videoHeight;
    }
    setTimeout(startScanning, 300);
  }

  } catch(fatal) {
    setPill('err', 'Crash');
    console.error('[FATAL]', fatal);
  }
})();

// Service Worker — force refresh
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(function(regs) {
    regs.forEach(function(r) { r.unregister(); });
    setTimeout(function() { navigator.serviceWorker.register('sw.js').catch(function(){}); }, 500);
  });
}
</script>
</body>
</html>
