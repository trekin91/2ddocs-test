<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0c1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <title>VetScan — Scanner GS1</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#0c1117;--bg2:#141b23;--bg3:#1a232e;
      --border:#243040;--border-hi:#2e4a5e;
      --text:#e2e8f0;--text-dim:#6b8299;--text-muted:#3d5468;
      --teal:#60b8f0;--teal-dim:#60b8f015;--teal-glow:#60b8f040;
      --blue:#38bdf8;--blue-dim:#38bdf815;
      --amber:#fbbf24;--amber-dim:#fbbf2415;
      --red:#f87171;
      --radius:14px;--radius-sm:10px;
    }
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden;-webkit-tap-highlight-color:transparent}
    .app{display:flex;flex-direction:column;height:100dvh;max-width:500px;margin:0 auto;position:relative}
    .header{padding:14px 20px;display:flex;align-items:center;gap:14px;z-index:10;background:linear-gradient(180deg,var(--bg) 0%,var(--bg) 80%,transparent 100%)}
    .logo{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--teal),#3a8fd4);display:grid;place-items:center;flex-shrink:0;box-shadow:0 4px 16px var(--teal-glow)}
    .logo svg{width:22px;height:22px}
    .header-text h1{font-size:1.15rem;font-weight:700;letter-spacing:-.03em;line-height:1.1}
    .header-text small{font-size:.68rem;color:var(--text-dim);font-weight:400;letter-spacing:.02em}
    .pill{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:.62rem;padding:5px 10px;border-radius:20px;background:var(--bg3);border:1px solid var(--border);color:var(--text-dim);font-family:'IBM Plex Mono',monospace;transition:all .4s;white-space:nowrap}
    .pill .dot{width:6px;height:6px;border-radius:50%;transition:all .4s}
    .pill.ok .dot{background:var(--teal);box-shadow:0 0 6px var(--teal-glow)}
    .pill.ok{color:var(--teal);border-color:var(--teal-glow)}
    .pill.loading .dot{background:var(--amber);animation:pulse 1.2s ease infinite}
    .pill.err .dot{background:var(--red)}.pill.err{color:var(--red)}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
    .camera{position:relative;flex:1;background:#000;overflow:hidden}
    #video{width:100%;height:100%;object-fit:cover}
    .overlay{position:absolute;inset:0;pointer-events:none}
    .vignette{position:absolute;inset:0;background:radial-gradient(circle 260px at 50% 48%,transparent 30%,rgba(12,17,23,.75) 70%)}
    .frame{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px}
    .frame-border{position:absolute;inset:0;border:1.5px solid rgba(96,184,240,.25);border-radius:16px}
    .frame .c{position:absolute;width:24px;height:24px;border-style:solid;border-color:var(--teal)}
    .c.tl{top:-1px;left:-1px;border-width:2.5px 0 0 2.5px;border-radius:10px 0 0 0}
    .c.tr{top:-1px;right:-1px;border-width:2.5px 2.5px 0 0;border-radius:0 10px 0 0}
    .c.bl{bottom:-1px;left:-1px;border-width:0 0 2.5px 2.5px;border-radius:0 0 0 10px}
    .c.br{bottom:-1px;right:-1px;border-width:0 2.5px 2.5px 0;border-radius:0 0 10px 0}
    .sweep{position:absolute;left:8%;width:84%;height:1.5px;background:linear-gradient(90deg,transparent,var(--teal),transparent);box-shadow:0 0 16px var(--teal-glow);border-radius:2px;animation:sweep 2.2s ease-in-out infinite}
    @keyframes sweep{0%,100%{top:8%;opacity:.3}50%{top:90%;opacity:.9}}
    .flash{position:absolute;inset:0;background:var(--teal);opacity:0;transition:opacity .12s;pointer-events:none}
    .flash.on{opacity:.2;transition:none}
    .hint{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);font-size:.72rem;color:var(--text-dim);background:rgba(12,17,23,.75);backdrop-filter:blur(8px);padding:8px 16px;border-radius:20px;white-space:nowrap;border:1px solid var(--border)}
    .controls{padding:14px 20px;background:var(--bg);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:18px}
    .btn{border:none;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:8px}
    .btn:active{transform:scale(.94)}
    .btn-round{width:48px;height:48px;border-radius:50%;display:grid;place-items:center;background:var(--bg3);color:var(--text-dim);border:1px solid var(--border)}
    .btn-round svg{width:20px;height:20px}
    .btn-round.active{background:var(--teal-dim);color:var(--teal);border-color:var(--teal-glow)}
    .btn-scan{width:68px;height:68px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,var(--teal),#3a8fd4);color:#0c1117;border:3px solid var(--bg);box-shadow:0 0 0 2px var(--teal),0 4px 20px var(--teal-glow)}
    .btn-scan svg{width:28px;height:28px}
    .file-wrap{position:relative;display:inline-block}
    .file-wrap input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer}
    .results{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .4s cubic-bezier(.16,1,.3,1)}
    .results.open{transform:translateY(0)}
    .results-head{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
    .results-head h2{font-size:1.05rem;font-weight:700}
    .btn-x{width:34px;height:34px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:50%;display:grid;place-items:center;cursor:pointer;font-size:1.1rem}
    .results-body{flex:1;overflow-y:auto;padding:20px;-webkit-overflow-scrolling:touch}
    .results-foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:10px}
    .results-foot .btn{flex:1;justify-content:center;font-weight:600;border-radius:12px;padding:14px 0;font-size:.9rem}
    .btn-ghost{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
    .btn-fill{background:linear-gradient(135deg,var(--teal),#3a8fd4);color:#0c1117;border:none}
    .product-hero{background:linear-gradient(135deg,var(--teal-dim),var(--blue-dim));border:1px solid var(--border-hi);border-radius:var(--radius);padding:20px;margin-bottom:20px}
    .product-hero .gtin{font-family:'IBM Plex Mono',monospace;font-size:.72rem;color:var(--teal);font-weight:500;margin-bottom:4px}
    .product-hero .title{font-size:1rem;font-weight:600;margin-bottom:14px;line-height:1.3}
    .meta-row{display:flex;gap:10px;flex-wrap:wrap}
    .meta-chip{display:flex;align-items:center;gap:6px;background:rgba(12,17,23,.5);border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:.78rem}
    .meta-chip .lbl{color:var(--text-dim);font-size:.62rem;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
    .meta-chip strong{color:var(--text);font-weight:600}
    .meta-chip.exp strong{color:var(--amber)}
    .expiry-bar{margin-top:14px;padding:10px 14px;border-radius:10px;font-size:.78rem;font-weight:600;display:flex;align-items:center;gap:8px}
    .expiry-bar.valid{background:#60b8f012;color:var(--teal);border:1px solid #60b8f020}
    .expiry-bar.warn{background:#fbbf2412;color:var(--amber);border:1px solid #fbbf2420}
    .expiry-bar.expired{background:#f8717112;color:var(--red);border:1px solid #f8717120}
    .section-title{font-size:.66rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin:20px 0 10px}
    .fields{display:flex;flex-direction:column;gap:6px}
    .field{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;display:flex;justify-content:space-between;align-items:baseline;gap:12px}
    .field-left{flex:1;min-width:0}
    .field-ai{font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:var(--teal);font-weight:500}
    .field-label{font-size:.72rem;color:var(--text-dim)}
    .field-val{font-size:.92rem;font-weight:600;word-break:break-word;text-align:right;font-family:'IBM Plex Mono',monospace}
    .raw-block{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-top:6px}
    .raw-label{font-size:.6rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:6px}
    .raw-block pre{font-family:'IBM Plex Mono',monospace;font-size:.7rem;color:var(--teal);white-space:pre-wrap;word-break:break-all;line-height:1.6}
    .badge{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:8px;font-size:.72rem;font-weight:600;margin-bottom:16px;background:var(--teal-dim);color:var(--teal);border:1px solid rgba(96,184,240,.15)}
    #capture-canvas{display:none}
    @supports(padding-top:env(safe-area-inset-top)){
      .header{padding-top:calc(14px + env(safe-area-inset-top))}
      .results-foot{padding-bottom:calc(14px + env(safe-area-inset-bottom))}
      .controls{padding-bottom:calc(14px + env(safe-area-inset-bottom))}
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0c1117" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M7 3C4.24 3 2 5.69 2 9c0 3.92 3.18 7.29 8.35 11.66a2.5 2.5 0 0 0 3.3 0C18.82 16.29 22 12.92 22 9c0-3.31-2.24-6-5-6a5.07 5.07 0 0 0-3.79 1.89l-.21.25-.21-.25A5.07 5.07 0 0 0 7 3z"/>
      </svg>
    </div>
    <div class="header-text"><h1>VetScan</h1><small>Scanner GS1 DataMatrix</small></div>
    <div class="pill loading" id="pill"><span class="dot"></span><span id="pill-txt">Init…</span></div>
  </div>
  <div class="camera">
    <video id="video" autoplay playsinline muted></video>
    <div class="overlay">
      <div class="vignette"></div>
      <div class="frame"><div class="frame-border"></div><div class="c tl"></div><div class="c tr"></div><div class="c bl"></div><div class="c br"></div><div class="sweep"></div></div>
      <div class="flash" id="flash"></div>
      <div class="hint">Visez le DataMatrix du médicament</div>
    </div>
  </div>
  <div class="controls">
    <button class="btn btn-round" id="btn-torch"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M15.5 8a3.5 3.5 0 0 0-7 0c0 2 1.5 3 2 4h3c.5-1 2-2 2-4z"/></svg></button>
    <button class="btn btn-scan" id="btn-capture"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><line x1="14" y1="14" x2="21" y2="14"/><line x1="14" y1="17.5" x2="21" y2="17.5"/><line x1="14" y1="21" x2="21" y2="21"/></svg></button>
    <label class="btn btn-round file-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg><input type="file" accept="image/*" id="file-input"></label>
  </div>
  <canvas id="capture-canvas"></canvas>
</div>
<div class="results" id="results">
  <div class="results-head"><h2>Résultat</h2><button class="btn-x" id="btn-close">&times;</button></div>
  <div class="results-body" id="results-body"></div>
  <div class="results-foot"><button class="btn btn-ghost" id="btn-copy">Copier</button><button class="btn btn-fill" id="btn-rescan">Nouveau scan</button></div>
</div>
<script>
window.onerror=function(){setPill('err','Erreur')};
function setPill(t,x){var p=document.getElementById('pill'),s=document.getElementById('pill-txt');if(p)p.className='pill '+t;if(s)s.textContent=x}
(async function(){try{
if(document.readyState==='loading')await new Promise(function(r){document.addEventListener('DOMContentLoaded',r)});
var video=document.getElementById('video'),canvas=document.getElementById('capture-canvas'),ctx=canvas.getContext('2d',{willReadFrequently:true}),results=document.getElementById('results'),body=document.getElementById('results-body'),flash=document.getElementById('flash');
var stream=null,det=null,scanning=false,torchOn=false,lastRaw='',raf=null,useNative=false,usePoly=false;
var audioCtx=null;
function beep(){try{if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext);[780,1040].forEach(function(f,i){var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.value=f;g.gain.value=.12;g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.14+i*.09);o.connect(g);g.connect(audioCtx.destination);o.start(audioCtx.currentTime+i*.09);o.stop(audioCtx.currentTime+.14+i*.09)})}catch(e){}}
function fb(){beep();flash.classList.add('on');setTimeout(function(){flash.classList.remove('on')},140);try{navigator.vibrate&&navigator.vibrate([60,30,60])}catch(e){}}
function sl(ms){return new Promise(function(r){setTimeout(r,ms)})}
// Engine
setPill('loading','Moteur…');
if('BarcodeDetector' in window){try{var f=await BarcodeDetector.getSupportedFormats();if(f.indexOf('data_matrix')>=0){det=new BarcodeDetector({formats:['data_matrix']});useNative=true}}catch(e){}}
if(!useNative){setPill('loading','WASM…');var urls=['https://cdn.jsdelivr.net/npm/barcode-detector@2/dist/es/pure.min.js','https://unpkg.com/barcode-detector@2/dist/es/pure.min.js','https://esm.sh/barcode-detector@2?bundle'];
for(var ci=0;ci<urls.length;ci++){if(usePoly)break;try{var m=await Promise.race([import(urls[ci]),new Promise(function(_,j){setTimeout(function(){j(new Error('t'))},15000)})]);var D=m.BarcodeDetector||(m.default&&m.default.BarcodeDetector)||m.default;if(D&&typeof D==='function'){det=new D({formats:['data_matrix']});usePoly=true}}catch(e){}}}
// Camera
setPill('loading','Caméra…');
try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}},audio:false});video.srcObject=stream;video.play().catch(function(){});var a=0;while(video.videoWidth===0&&a<60){await sl(100);a++}canvas.width=video.videoWidth||1280;canvas.height=video.videoHeight||720}catch(e){setPill('err','Caméra ✗')}
if(det&&video.videoWidth>0){setPill('ok',(useNative?'Natif':'WASM')+' ✓');startScan()}else if(!det){setPill('err','Décodeur ✗')}else{setPill('err','Vidéo ✗')}
// Events
document.getElementById('btn-torch').addEventListener('click',async function(){if(!stream)return;var t=stream.getVideoTracks()[0],c=t.getCapabilities?t.getCapabilities():{};if(!c.torch)return;torchOn=!torchOn;await t.applyConstraints({advanced:[{torch:torchOn}]});this.classList.toggle('active',torchOn)});
document.getElementById('btn-capture').addEventListener('click',manual);
document.getElementById('file-input').addEventListener('change',function(e){if(e.target.files&&e.target.files[0])decFile(e.target.files[0]);e.target.value=''});
document.getElementById('btn-close').addEventListener('click',closeR);
document.getElementById('btn-rescan').addEventListener('click',closeR);
document.getElementById('btn-copy').addEventListener('click',function(){navigator.clipboard.writeText(lastRaw).then(function(){var b=document.getElementById('btn-copy');b.textContent='Copié ✓';setTimeout(function(){b.textContent='Copier'},1500)})});
// Scan
function startScan(){if(scanning||!det)return;scanning=true;var iv=usePoly?250:50,last=0;
function loop(ts){if(!scanning)return;if(ts-last<iv){raf=requestAnimationFrame(loop);return}last=ts;
try{if(video.videoWidth===0){raf=requestAnimationFrame(loop);return}ctx.drawImage(video,0,0,canvas.width,canvas.height);
det.detect(canvas).then(function(r){if(r&&r.length>0&&r[0].rawValue&&r[0].rawValue.length>5&&scanning){scanning=false;fb();onDec(r[0].rawValue)}}).catch(function(){})}catch(e){}
if(scanning)raf=requestAnimationFrame(loop)}raf=requestAnimationFrame(loop)}
function stopScan(){scanning=false;if(raf)cancelAnimationFrame(raf)}
async function manual(){if(video.videoWidth===0||!det)return;ctx.drawImage(video,0,0,canvas.width,canvas.height);
var vs=[canvas,enh(canvas),crop(canvas,.55),bin(canvas)];
for(var i=0;i<vs.length;i++){try{var r=await det.detect(vs[i]);if(r&&r.length>0&&r[0].rawValue&&r[0].rawValue.length>5){fb();onDec(r[0].rawValue);return}}catch(e){}}
setPill('err','Non détecté');setTimeout(function(){setPill('ok',(useNative?'Natif':'WASM')+' ✓')},2000)}
async function decFile(file){var img=new Image;img.onload=async function(){canvas.width=img.naturalWidth;canvas.height=img.naturalHeight;ctx.drawImage(img,0,0);
var vs=[canvas,enh(canvas),bin(canvas),crop(canvas,.6)];
for(var i=0;i<vs.length;i++){try{var r=await det.detect(vs[i]);if(r&&r.length>0&&r[0].rawValue&&r[0].rawValue.length>5){fb();onDec(r[0].rawValue);return}}catch(e){}}
setPill('err','Non trouvé');setTimeout(function(){setPill('ok','Prêt')},2000)};img.src=URL.createObjectURL(file)}
function enh(s){var c=document.createElement('canvas');c.width=s.width;c.height=s.height;var x=c.getContext('2d');x.filter='contrast(2) grayscale(1) brightness(1.1)';x.drawImage(s,0,0);return c}
function crop(s,r){var sz=Math.min(s.width,s.height)*r,x=(s.width-sz)/2,y=(s.height-sz)/2;var c=document.createElement('canvas');c.width=sz;c.height=sz;c.getContext('2d').drawImage(s,x,y,sz,sz,0,0,sz,sz);return c}
function bin(s){var c=document.createElement('canvas');c.width=s.width;c.height=s.height;var x=c.getContext('2d',{willReadFrequently:true});x.filter='contrast(3) grayscale(1) brightness(1.2)';x.drawImage(s,0,0);x.filter='none';var id=x.getImageData(0,0,c.width,c.height),d=id.data;for(var i=0;i<d.length;i+=4){var g=d[i]*.3+d[i+1]*.59+d[i+2]*.11;d[i]=d[i+1]=d[i+2]=g>128?255:0}x.putImageData(id,0,0);return c}
// Result
function onDec(raw){lastRaw=raw;stopScan();render(raw,parseGS1(raw));results.classList.add('open')}
function closeR(){results.classList.remove('open');if(video.videoWidth>0){canvas.width=video.videoWidth;canvas.height=video.videoHeight}setTimeout(startScan,300)}
// GS1 Parser
function parseGS1(raw){var res={fields:[],isGS1:false},data=raw;
if(data.indexOf(']d2')===0||data.indexOf(']Q3')===0||data.indexOf(']C1')===0)data=data.substring(3);
while(data.length>0&&(data.charCodeAt(0)<=0x1F||data.charCodeAt(0)===232))data=data.substring(1);
data=data.replace(/\((\d{2,4})\)/g,'$1');
if(/^01\d{14}/.test(data)||/^\d{2}/.test(data))res.isGS1=true;
var pos=0,mx=50;
while(pos<data.length&&mx-->0){if(data.charCodeAt(pos)<=0x1F){pos++;continue}var ok=false;
for(var a=0;a<AIS.length;a++){var d=AIS[a],c=d[0];if(data.substring(pos,pos+c.length)!==c)continue;pos+=c.length;var v='';
if(d[2]>0){v=data.substring(pos,pos+d[2]);pos+=d[2]}else{var e=data.length;for(var vi=pos;vi<data.length;vi++){if(data.charCodeAt(vi)<=0x1F){e=vi;break}}v=data.substring(pos,e);pos=e}
res.fields.push({ai:c,label:d[1],value:fmtV(c,v),raw:v});ok=true;break}
if(!ok){if(data.substring(pos).length>0)res.fields.push({ai:'??',label:'Données',value:data.substring(pos),raw:data.substring(pos)});break}}return res}
function fmtV(ai,v){if(('17'===ai||'11'===ai||'13'===ai||'15'===ai)&&v.length===6)return v.substring(4,6)+'/'+v.substring(2,4)+'/20'+v.substring(0,2);return v}
function expStatus(fields){var f=null;for(var i=0;i<fields.length;i++){if(fields[i].ai==='17'){f=fields[i];break}}if(!f||f.raw.length!==6)return null;
var y=2000+parseInt(f.raw.substring(0,2),10),m=parseInt(f.raw.substring(2,4),10)-1,d=parseInt(f.raw.substring(4,6),10)||28;
var exp=new Date(y,m,d),diff=Math.ceil((exp-new Date)/864e5);
if(diff<0)return{t:'Expiré depuis '+Math.abs(diff)+' jours',c:'expired'};
if(diff<90)return{t:'Expire dans '+diff+' jours',c:'warn'};
return{t:'Valide — '+diff+' jours restants',c:'valid'}}
var AIS=[['00','SSCC',18],['01','GTIN',14],['02','GTIN contenu',14],['10','N° Lot',0],['11','Date production',6],['13','Date emballage',6],['15','DLC optimale',6],['17','Date expiration',6],['20','Variante',2],['21','N° Série',0],['22','Données sec.',0],['235','Extension TPX',0],['240','ID compl.',0],['241','N° Client',0],['250','Série sec.',0],['253','ID global',0],['30','Quantité',0],['3100','Poids (kg)',6],['3101','Poids (kg)',6],['3102','Poids (kg)',6],['3103','Poids (kg)',6],['310','Poids (kg)',6],['320','Poids (lb)',6],['37','Nb unités',0],['400','N° Commande',0],['410','GLN dest.',13],['411','GLN fact.',13],['414','GLN lieu',13],['415','GLN émetteur',13],['421','CP dest.',0],['422','Pays origine',3],['710','NHRN DE',0],['711','NHRN FR (CIP)',0],['712','NHRN ES',0],['713','NHRN BR',0],['714','NHRN PT',0],['7003','Exp. date/heure',10],['91','Info interne',0],['92','Info interne',0],['93','Info interne',0]];
AIS.sort(function(a,b){return b[0].length-a[0].length||a[0].localeCompare(b[0])});
// Render
function render(raw,gs1){var h='';
if(gs1.isGS1&&gs1.fields.length>0){h+='<div class="badge">📦 GS1 DataMatrix</div>';
var gtin=fd(gs1.fields,'01'),lot=fd(gs1.fields,'10'),exp=fd(gs1.fields,'17'),sn=fd(gs1.fields,'21'),es=expStatus(gs1.fields);
h+='<div class="product-hero">';

h+='<div class="title">Médicament vétérinaire</div><div class="meta-row">';
if(lot)h+='<div class="meta-chip"><span>🏷</span><span><span class="lbl">Lot </span><strong>'+esc(lot.value)+'</strong></span></div>';
if(exp)h+='<div class="meta-chip exp"><span>📅</span><span><span class="lbl">Exp </span><strong>'+esc(exp.value)+'</strong></span></div>';
if(sn)h+='<div class="meta-chip"><span>🔢</span><span><span class="lbl">SN </span><strong>'+esc(sn.value)+'</strong></span></div>';
h+='</div>';
if(es)h+='<div class="expiry-bar '+es.c+'">'+(es.c==='valid'?'✅':es.c==='warn'?'⚠️':'❌')+' '+es.t+'</div>';
h+='</div>';

for(var i=0;i<gs1.fields.length;i++){var fi=gs1.fields[i];h+='<div class="field"><div class="field-left"><div class="field-ai">('+esc(fi.ai)+')</div><div class="field-label">'+esc(fi.label)+'</div></div><div class="field-val">'+esc(fi.value)+'</div></div>'}
h+='</div>'}else{h+='<div class="badge" style="background:var(--bg3);color:var(--text-dim);border-color:var(--border)">DataMatrix</div>';
h+='<div class="product-hero"><div class="title" style="font-size:1.05rem;word-break:break-all">'+esc(raw)+'</div></div>'}
h+='<div class="section-title">Brut</div><div class="raw-block"><div class="raw-label">'+raw.length+' car.</div><pre>'+esc(fmtR(raw))+'</pre></div>';
body.innerHTML=h}
function fd(f,ai){for(var i=0;i<f.length;i++){if(f[i].ai===ai)return f[i]}return null}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtR(s){return s.replace(/[\x00-\x1F]/g,function(c){var n=c.charCodeAt(0);return{29:'⟨GS⟩',30:'⟨RS⟩',31:'⟨US⟩'}[n]||'⟨'+n.toString(16).padStart(2,'0')+'⟩'})}
}catch(e){setPill('err','Crash');console.error(e)}})();
if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(function(rs){rs.forEach(function(r){r.unregister()});setTimeout(function(){navigator.serviceWorker.register('sw.js').catch(function(){})},500)})}
</script>
